<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Village Monopoly | Teacher Ivan HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul-primario: #0A468C; 
            --naranja-vibrante: #F56E1E; 
            --azul-claro: #96C8E6;
            --gris-neutro: #C8CDD2;
            --blanco-nieve: #FAFAF0; 
            --blanco-puro: #FFFFFF;
            --verde-exito: #28a745;
            --rojo-alerta: #dc3545;
            --font-titulares: 'Montserrat', sans-serif; 
            --font-cuerpo: 'Open Sans', sans-serif; 
        }

        body {
            margin: 0; padding: 0;
            font-family: var(--font-cuerpo);
            background-color: var(--blanco-nieve);
            color: #333;
            -webkit-font-smoothing: antialiased;
            display: flex; flex-direction: column; min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Pantalla de Login --- */
        #loginOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(10, 70, 140, 0.95), rgba(10, 70, 140, 1)), url('https://i.imgur.com/AIOtoMn.jpeg');
            background-size: cover; background-position: center;
            z-index: 2000; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }

        .login-box {
            background: var(--blanco-puro);
            padding: 40px 30px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center; width: 85%; max-width: 320px;
        }

        .login-box img { height: 80px; margin-bottom: 10px; }
        .login-box h2 { font-family: var(--font-titulares); color: var(--azul-primario); margin-top: 0; text-transform: uppercase;}
        
        .login-input {
            width: 100%; padding: 12px; margin-bottom: 15px;
            border: 2px solid var(--gris-neutro); border-radius: 10px;
            font-family: var(--font-cuerpo); font-size: 1rem;
            box-sizing: border-box; text-align: center;
            outline: none; transition: 0.3s;
        }
        .login-input:focus { border-color: var(--naranja-vibrante); }

        .login-btn {
            background: var(--naranja-vibrante); color: white;
            border: none; padding: 15px; width: 100%;
            border-radius: 50px; font-family: var(--font-titulares);
            font-size: 1.1rem; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(245, 110, 30, 0.4); transition: 0.2s;
        }
        .login-btn:active { transform: scale(0.95); }

        /* --- Encabezado --- */
        header {
            background-color: var(--azul-primario);
            color: var(--blanco-puro);
            text-align: center; padding: 1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: sticky; top: 0; z-index: 100;
        }

        header h1 { font-family: var(--font-titulares); margin: 0; font-size: 1.2rem; text-transform: uppercase;}
        header h1 span { color: var(--naranja-vibrante); }

        /* --- Panel del Jugador --- */
        .player-dashboard {
            background: var(--blanco-puro);
            padding: 1rem 1.5rem; margin: 1rem; border-radius: 15px;
            box-shadow: 0 8px 20px rgba(10, 70, 140, 0.08);
            display: flex; justify-content: space-between; align-items: center;
            border-left: 6px solid var(--naranja-vibrante);
        }

        .balance-box { text-align: left; }
        .balance-title { font-size: 0.8rem; text-transform: uppercase; color: #666; font-weight: bold; }
        .balance-amount { font-family: var(--font-titulares); font-size: 1.8rem; color: var(--azul-primario); margin: 2px 0;}
        .goal-text { font-size: 0.75rem; color: #888; font-weight: 600;}

        .player-info { text-align: right; }
        .player-name { font-weight: 800; font-size: 1rem; color: var(--azul-primario); }
        .player-id { font-size: 0.8rem; color: #666; margin-top: 3px; }

        /* --- Tablero Visual --- */
        .board-container {
            margin: 0 auto;
            width: 320px; height: 320px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 8px; padding: 10px;
        }

        .board-tile {
            background: white; border-radius: 10px;
            border: 2px solid #ccc;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            font-size: 0.7rem; font-weight: bold; text-align: center;
            position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: 0.3s;
        }

        .tile-color-bar {
            position: absolute; top: 0; left: 0; width: 100%; height: 8px;
            border-top-left-radius: 8px; border-top-right-radius: 8px;
        }

        /* Posicionamiento en cuadrícula 3x3 para formar el circuito */
        #b-tile-0 { grid-column: 1; grid-row: 1; border-color: var(--gris-neutro); }
        #b-tile-1 { grid-column: 2; grid-row: 1; }
        #b-tile-2 { grid-column: 3; grid-row: 1; }
        #b-tile-3 { grid-column: 3; grid-row: 2; }
        #b-tile-4 { grid-column: 3; grid-row: 3; border-color: var(--rojo-alerta); }
        #b-tile-5 { grid-column: 2; grid-row: 3; }
        #b-tile-6 { grid-column: 1; grid-row: 3; }
        #b-tile-7 { grid-column: 1; grid-row: 2; border-color: var(--naranja-vibrante); }

        /* Centro del tablero para el Dado */
        .board-center {
            grid-column: 2; grid-row: 2;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }

        .avatar {
            font-size: 1.5rem; position: absolute; z-index: 10;
            animation: bounceIn 0.5s;
        }

        @keyframes bounceIn {
            0% { transform: scale(0) translateY(-20px); opacity: 0;}
            50% { transform: scale(1.2) translateY(5px); opacity: 1;}
            100% { transform: scale(1) translateY(0); }
        }

        /* --- Animación de Dados --- */
        .dice-btn {
            background: transparent; border: none; cursor: pointer; outline: none;
            display: flex; flex-direction: column; align-items: center;
        }
        
        .dice-icon {
            font-size: 4rem; line-height: 1; color: var(--azul-primario);
            transition: 0.3s; text-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        
        .dice-text {
            font-family: var(--font-titulares); font-size: 0.7rem;
            color: var(--naranja-vibrante); margin-top: 5px; text-transform: uppercase;
        }

        .dice-rolling {
            animation: rollDiceAnim 0.6s linear infinite;
            color: var(--naranja-vibrante);
        }

        @keyframes rollDiceAnim {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.2); }
            100% { transform: rotate(360deg) scale(1); }
        }

        /* --- Modal Tarjeta de Reto --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 1000;
            display: none; justify-content: center; align-items: center;
            padding: 20px; box-sizing: border-box;
        }

        .tile-card {
            background: var(--blanco-puro); width: 100%; max-width: 350px;
            border-radius: 20px; overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center; border: 4px solid var(--azul-primario);
        }

        .tile-header {
            background: var(--azul-primario); color: white;
            padding: 18px; font-family: var(--font-titulares); font-size: 1.4rem;
        }
        
        .tile-category { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.9; display: block; margin-bottom: 8px; }
        .tile-body { padding: 25px; }
        .challenge-text { font-size: 1.15rem; line-height: 1.6; font-weight: 600; color: #333; margin-bottom: 20px; }
        
        .cost-info { font-size: 0.95rem; color: #666; margin-bottom: 20px; background: rgba(150, 200, 230, 0.2); padding: 10px; border-radius: 8px;}
        .cost-info span { font-weight: 800; color: var(--azul-primario); }

        .timer-box {
            background: rgba(220, 53, 69, 0.1); color: var(--rojo-alerta);
            padding: 12px; border-radius: 12px; font-family: var(--font-titulares);
            font-size: 1.8rem; margin-bottom: 20px; border: 2px solid var(--rojo-alerta);
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }

        .action-btn {
            background-color: var(--verde-exito); color: white; border: none;
            padding: 16px 20px; font-size: 1.1rem; font-family: var(--font-titulares);
            border-radius: 50px; cursor: pointer; width: 100%; transition: 0.2s; text-transform: uppercase;
        }
        .action-btn:active { transform: scale(0.95); }

        /* --- Notificaciones --- */
        .notification {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--azul-primario); color: white;
            padding: 15px 30px; border-radius: 50px; font-weight: bold; font-size: 1rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
            opacity: 0; transition: 0.3s; pointer-events: none; z-index: 1500;
            text-align: center; width: 80%; max-width: 400px;
        }
        .notification.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }
    </style>
</head>
<body>

    <!-- PANTALLA DE LOGIN -->
    <div id="loginOverlay">
        <div class="login-box">
            <img src="https://i.imgur.com/s05NqFM.png" alt="Logo">
            <h2>Welcome to HUB</h2>
            <p style="font-size: 0.9rem; color: #666; margin-bottom: 20px;">Ingresa tus datos para comenzar a jugar.</p>
            <input type="text" id="inputName" class="login-input" placeholder="Tu Nombre (Ej. Leonardo)" autocomplete="off">
            <input type="text" id="inputId" class="login-input" placeholder="Player ID (Ej. P001)" autocomplete="off">
            <button class="login-btn" onclick="loginGame()">Join Game</button>
        </div>
    </div>

    <header>
        <h1>Global Village <span>Monopoly</span></h1>
    </header>

    <!-- DASHBOARD DEL JUGADOR -->
    <div class="player-dashboard">
        <div class="balance-box">
            <div class="balance-title">Tokens (Bs)</div>
            <div class="balance-amount" id="balanceDisplay">0</div>
            <div class="goal-text">Goal: 2000 Bs</div>
        </div>
        <div class="player-info">
            <div class="player-name" id="displayPlayerName">Player</div>
            <div class="player-id" id="displayPlayerId">ID: --</div>
        </div>
    </div>

    <!-- TABLERO VISUAL Y DADO -->
    <div class="board-container" id="boardArea">
        <div class="board-tile" id="b-tile-0">START<div id="playerAvatar" class="avatar">👦</div></div>
        <div class="board-tile" id="b-tile-1"><div class="tile-color-bar" style="background:#8B4513;"></div>Airport</div>
        <div class="board-tile" id="b-tile-2"><div class="tile-color-bar" style="background:#8B4513;"></div>Bistro</div>
        <div class="board-tile" id="b-tile-3"><div class="tile-color-bar" style="background:#96C8E6;"></div>Bedroom</div>
        <div class="board-tile" id="b-tile-4"><div class="tile-color-bar" style="background:#dc3545;"></div>Silent Zone</div>
        <div class="board-tile" id="b-tile-5"><div class="tile-color-bar" style="background:#E91E63;"></div>Startup</div>
        <div class="board-tile" id="b-tile-6"><div class="tile-color-bar" style="background:#E91E63;"></div>PR Crisis</div>
        <div class="board-tile" id="b-tile-7"><div class="tile-color-bar" style="background:#F56E1E;"></div>Chance</div>
        
        <div class="board-center">
            <button class="dice-btn" id="diceBtn" onclick="rollDice()">
                <div class="dice-icon" id="diceIcon">🎲</div>
                <div class="dice-text">Roll Dice</div>
            </button>
        </div>
    </div>

    <!-- MODAL TARJETA DE RETO -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="tile-card" id="tileCard">
            <div class="tile-header" id="tileHeader">
                <span class="tile-category" id="tileCategory">Category</span>
                <span id="tileName">Tile Name</span>
            </div>
            <div class="tile-body">
                <div class="timer-box" id="timerBox">
                    ⏱️ <span id="timeDisplay">20.0</span>s
                </div>
                <div class="challenge-text" id="challengeText">
                    Here goes the English challenge prompt!
                </div>
                <div class="cost-info" id="costInfo">
                    Cost: <span id="tileCost">0</span> | Rent: <span id="tileRent">0</span>
                </div>
                <button class="action-btn" id="actionBtn" onclick="completeChallenge()">Complete & Claim</button>
            </div>
        </div>
    </div>

    <div class="notification" id="notificationBox">Message</div>

    <script>
        // ==========================================
        // CONFIGURACIÓN, BASE DE DATOS Y ESTADO
        // ==========================================
        const API_URL = "https://script.google.com/macros/s/AKfycbynFDCGHDtv5gZQAcV_b2wRqwx-ldhUFAap3kdVeFaoq1Ycca1_B0eGK07cI9uhNfg8Aw/exec"; 
        
        const GOAL = 2000;
        const TIME_LIMIT = 20; 
        const PENALTY = 50; 
        
        let currentPlayerId = "";
        let currentBalance = 0;
        let currentPosition = 0; // Posición actual en el array del tablero (0 a 7)
        let timerInterval;
        let timeRemaining;
        let currentTileData = null;

        const diceFaces = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];

        // Arreglo del tablero ordenado (8 casillas en total formando el circuito)
        const orderedBoard = [
            { name: "Start (GO)", category: "System", color: "#C8CDD2", cost: 0, rent: 0, challenge: "Take a deep breath. Next turn you move!" },
            { name: "The Airport", category: "Survival", color: "#8B4513", cost: 60, rent: 10, challenge: "Order a flight ticket to London." },
            { name: "The QR Bistro", category: "Survival", color: "#8B4513", cost: 60, rent: 10, challenge: "Order a burger and water politely." },
            { name: "The Bedroom", category: "Daily Routine", color: "#96C8E6", cost: 100, rent: 30, challenge: "Describe 3 objects in your bedroom using prepositions." },
            { name: "The Silent Zone", category: "Jail", color: "#dc3545", cost: 0, rent: 0, challenge: "You are trapped! Spell 'ENVIRONMENT' in 10 seconds to escape." },
            { name: "The Tech Startup", category: "Professional", color: "#E91E63", cost: 140, rent: 50, challenge: "Use a conditional to pitch a crazy app idea." },
            { name: "The PR Crisis Room", category: "Professional", color: "#E91E63", cost: 140, rent: 50, challenge: "Apologize formally for a late delivery." },
            { name: "Chance", category: "Luck", color: "#F56E1E", cost: 0, rent: 0, challenge: "Fluency Boost! Say a tongue twister to win 100 Bs." }
        ];

        // ==========================================
        // LÓGICA DE JUEGO Y UI
        // ==========================================

        function loginGame() {
            const name = document.getElementById('inputName').value.trim();
            const pid = document.getElementById('inputId').value.trim();
            
            if(!name || !pid) {
                alert("Por favor, ingresa tu Nombre y tu Player ID.");
                return;
            }

            currentPlayerId = pid;
            document.getElementById('displayPlayerName').textContent = name;
            document.getElementById('displayPlayerId').textContent = "ID: " + pid;
            
            // Ocultar pantalla de login
            document.getElementById('loginOverlay').style.display = 'none';
            showNotification(`¡Welcome, ${name}!`);
        }

        function showNotification(msg, isError = false) {
            const notif = document.getElementById('notificationBox');
            notif.textContent = msg;
            notif.style.backgroundColor = isError ? "var(--rojo-alerta)" : "var(--azul-primario)";
            notif.classList.add('show');
            setTimeout(() => { notif.classList.remove('show'); }, 3000);
        }

        async function updateBalanceInDatabase(amount) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({
                        action: 'updateBalance',
                        playerId: currentPlayerId,
                        amount: amount
                    })
                });
                
                const data = await response.json();
                
                if(data.status === "success") {
                    currentBalance = data.newBalance;
                    document.getElementById('balanceDisplay').textContent = currentBalance;
                    
                    if (currentBalance >= GOAL) {
                        document.getElementById('modalOverlay').style.display = 'flex';
                        document.getElementById('tileCard').innerHTML = `
                            <div style="padding: 30px;">
                                <h1 style="color: var(--verde-exito); font-size: 4rem; margin: 0;">🏆</h1>
                                <h2 style="color: var(--azul-primario); font-family: var(--font-titulares); font-size: 2rem;">¡YOU WIN!</h2>
                                <p style="font-size: 1.1rem; color: #555;">Has alcanzado los <strong>${GOAL} Tokens</strong> de fluidez.</p>
                            </div>`;
                    }
                }
            } catch (error) {
                showNotification("Error de conexión con el HUB. Jugando offline.", true);
                // Respaldo Offline
                currentBalance += amount;
                if(currentBalance < 0) currentBalance = 0;
                document.getElementById('balanceDisplay').textContent = currentBalance;
            }
        }

        function rollDice() {
            const diceBtn = document.getElementById('diceBtn');
            const diceIcon = document.getElementById('diceIcon');
            
            diceBtn.disabled = true;
            diceIcon.classList.add('dice-rolling');
            
            // Simular tiempo de giro del dado (800ms)
            setTimeout(() => {
                diceIcon.classList.remove('dice-rolling');
                
                // Número aleatorio de 1 a 6
                const steps = Math.floor(Math.random() * 6) + 1;
                diceIcon.textContent = diceFaces[steps - 1]; // Mostrar cara del dado
                
                // Mover Avatar
                moveAvatar(steps);

            }, 800);
        }

        function moveAvatar(steps) {
            currentPosition = (currentPosition + steps) % orderedBoard.length;
            const targetTile = document.getElementById('b-tile-' + currentPosition);
            const avatar = document.getElementById('playerAvatar');
            
            // Re-adjuntar el avatar al nuevo div de la casilla
            targetTile.appendChild(avatar);

            // Cargar datos de la casilla y mostrar tarjeta (ligera pausa)
            setTimeout(() => {
                currentTileData = orderedBoard[currentPosition];
                openChallengeModal(currentTileData);
            }, 600);
        }

        function openChallengeModal(tile) {
            const card = document.getElementById('tileCard');
            document.getElementById('tileCategory').textContent = tile.category;
            document.getElementById('tileName').textContent = tile.name;
            document.getElementById('tileHeader').style.backgroundColor = tile.color;
            document.getElementById('challengeText').textContent = tile.challenge;
            card.style.borderColor = tile.color; 
            
            if (tile.cost > 0) {
                document.getElementById('costInfo').innerHTML = `Cost: <span>${tile.cost} Bs</span> | Rent: <span>${tile.rent} Bs</span>`;
                document.getElementById('actionBtn').textContent = "Complete & Claim";
            } else {
                document.getElementById('costInfo').innerHTML = `Penalty Zone / Action Tile`;
                document.getElementById('actionBtn').textContent = "Complete Challenge";
            }

            document.getElementById('modalOverlay').style.display = 'flex';
            startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval);
            timeRemaining = currentTileData.category === "Jail" ? 10 : TIME_LIMIT; 
            
            const timeDisplay = document.getElementById('timeDisplay');
            const timerBox = document.getElementById('timerBox');
            
            timerBox.style.borderColor = "var(--azul-primario)";
            timerBox.style.color = "var(--azul-primario)";
            timerBox.style.backgroundColor = "rgba(10, 70, 140, 0.1)";

            timerInterval = setInterval(() => {
                timeRemaining -= 0.1;
                timeDisplay.textContent = timeRemaining.toFixed(1);

                if (timeRemaining <= 5) {
                    timerBox.style.borderColor = "var(--rojo-alerta)";
                    timerBox.style.color = "var(--rojo-alerta)";
                    timerBox.style.backgroundColor = "rgba(220, 53, 69, 0.1)";
                }

                if (timeRemaining <= 0) {
                    clearInterval(timerInterval);
                    timeDisplay.textContent = "0.0";
                    applyTimePenalty();
                }
            }, 100);
        }

        function applyTimePenalty() {
            updateBalanceInDatabase(-PENALTY);
            showNotification(`⏰ Time out! Penalty applied: -${PENALTY} Bs.`, true);
            closeModalAndReset();
        }

        function completeChallenge() {
            clearInterval(timerInterval);
            
            // Lógica de recompensa: Si es casilla de inicio, no da recompensa directa en el reto, 
            // pero las demás sí. 'Chance' da 100 fijos.
            let reward = 0;
            if(currentTileData.cost > 0) reward = currentTileData.cost;
            else if(currentTileData.category === "Luck") reward = 100;
            else if(currentTileData.category === "System") reward = 200; // Pasar por salida
            
            updateBalanceInDatabase(reward);
            showNotification(`✅ Challenge Complete! Earned ${reward} Bs.`);
            
            closeModalAndReset();
        }

        function closeModalAndReset() {
            document.getElementById('modalOverlay').style.display = 'none';
            document.getElementById('diceIcon').textContent = '🎲'; // Resetear ícono del dado
            document.getElementById('diceBtn').disabled = false;
        }
    </script>
</body>
</html>
