<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Village Monopoly | Teacher Ivan HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul-primario: #0A468C; 
            --naranja-vibrante: #F56E1E; 
            --azul-claro: #96C8E6;
            --gris-neutro: #C8CDD2;
            --blanco-nieve: #FAFAF0; 
            --blanco-puro: #FFFFFF;
            --verde-exito: #28a745;
            --rojo-alerta: #dc3545;
            
            /* Colores de Propiedades */
            --prop-brown: #8B4513;
            --prop-lblue: #96C8E6;
            --prop-pink: #E91E63;
            --prop-orange: #F56E1E;
            --prop-red: #dc3545;
            --prop-yellow: #FFC107;
            --prop-green: #28a745;
            --prop-dblue: #0A468C;

            --font-titulares: 'Montserrat', sans-serif; 
            --font-cuerpo: 'Open Sans', sans-serif; 
        }

        body {
            margin: 0; padding: 0;
            font-family: var(--font-cuerpo);
            background-color: var(--blanco-nieve);
            color: #333; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* --- LOBBY MULTIJUGADOR --- */
        #loginOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(10, 70, 140, 0.95), rgba(10, 70, 140, 1)), url('https://i.imgur.com/AIOtoMn.jpeg');
            background-size: cover; background-position: center;
            z-index: 2000; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }

        .lobby-box {
            background: var(--blanco-puro); padding: 40px; border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4); text-align: center;
            width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto;
        }

        .lobby-box img { height: 70px; margin-bottom: 10px; }
        .lobby-box h2 { font-family: var(--font-titulares); color: var(--azul-primario); margin-top: 0; text-transform: uppercase;}
        
        /* Selector de Avatares */
        .avatar-selector {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 15px;
            background: #f0f4f8; padding: 10px; border-radius: 12px;
        }
        .avatar-option {
            font-size: 1.8rem; cursor: pointer; padding: 5px; border-radius: 50%;
            border: 2px solid transparent; transition: 0.2s; user-select: none;
        }
        .avatar-option:hover { transform: scale(1.15); }
        .avatar-option.selected { border-color: var(--naranja-vibrante); background: #fff5ee; transform: scale(1.15);}

        .add-player-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .login-input {
            flex: 1; padding: 12px; border: 2px solid var(--gris-neutro); border-radius: 10px;
            font-family: var(--font-cuerpo); font-size: 1rem; outline: none; transition: 0.3s;
        }
        .login-input:focus { border-color: var(--naranja-vibrante); }
        
        .add-btn {
            background: var(--azul-primario); color: white; border: none; padding: 12px 20px;
            border-radius: 10px; font-family: var(--font-titulares); font-size: 1rem; cursor: pointer;
        }
        .add-btn:hover { background: #08356a; }

        .player-list-setup { list-style: none; padding: 0; margin-bottom: 20px; text-align: left; }
        .player-list-setup li {
            background: #f0f4f8; padding: 10px 15px; border-radius: 8px;
            margin-bottom: 8px; font-weight: bold; color: var(--azul-primario); display: flex; justify-content: space-between;
            align-items: center;
        }
        .setup-avatar-display { font-size: 1.5rem; margin-right: 10px; }

        .start-btn {
            background: var(--naranja-vibrante); color: white; border: none; padding: 15px; width: 100%;
            border-radius: 50px; font-family: var(--font-titulares); font-size: 1.2rem; cursor: pointer;
            text-transform: uppercase; box-shadow: 0 5px 15px rgba(245, 110, 30, 0.4); transition: 0.2s;
        }
        .start-btn:disabled { background: var(--gris-neutro); cursor: not-allowed; box-shadow: none; }
        .start-btn:active:not(:disabled) { transform: scale(0.95); }

        /* --- ENCABEZADO --- */
        header {
            background-color: var(--azul-primario); color: var(--blanco-puro);
            text-align: center; padding: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 100; flex-shrink: 0;
        }
        header h1 { font-family: var(--font-titulares); margin: 0; font-size: 1.4rem; letter-spacing: 1px;}
        header h1 span { color: var(--naranja-vibrante); }

        /* --- ESTRUCTURA PRINCIPAL (ESCRITORIO) --- */
        .main-layout { display: flex; flex: 1; overflow: hidden; background: #e6ebf0;}

        /* --- PANEL LATERAL MULTIJUGADOR --- */
        .sidebar {
            width: 350px; background: var(--blanco-puro); box-shadow: 2px 0 15px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; padding: 20px; z-index: 10;
        }

        .players-container { flex: 1; overflow-y: auto; margin-bottom: 20px; }
        
        .player-card {
            background: #f8f9fa; border: 2px solid transparent; border-radius: 12px;
            padding: 15px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px;
            transition: 0.3s;
        }
        .player-card.active-turn {
            border-color: var(--naranja-vibrante); background: #fff5ee;
            box-shadow: 0 4px 10px rgba(245, 110, 30, 0.15); transform: scale(1.02);
        }

        .p-avatar { font-size: 2.2rem; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.2)); }
        .p-info { flex: 1; }
        .p-name { font-weight: 800; color: var(--azul-primario); font-size: 1.1rem; margin-bottom: 5px;}
        .p-balance { font-family: var(--font-titulares); font-size: 1.4rem; color: var(--naranja-vibrante); transition: color 0.3s;}

        /* Zona de Dados */
        .dice-section { text-align: center; padding-top: 15px; border-top: 2px dashed var(--gris-neutro); }
        .dice-btn {
            background-color: var(--naranja-vibrante); color: var(--blanco-puro); border: none;
            padding: 15px 30px; font-size: 1.3rem; font-family: var(--font-titulares); font-weight: bold;
            border-radius: 50px; cursor: pointer; box-shadow: 0 6px 15px rgba(245, 110, 30, 0.3);
            width: 100%; text-transform: uppercase; transition: 0.2s;
        }
        .dice-btn:disabled { background-color: var(--gris-neutro); box-shadow: none; cursor: not-allowed; }
        
        .dice-icon { font-size: 4rem; color: var(--azul-primario); margin: 10px 0; display: inline-block;}
        .dice-rolling { animation: rollDiceAnim 0.5s linear infinite; color: var(--naranja-vibrante); }

        @keyframes rollDiceAnim {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.2); }
            100% { transform: rotate(360deg) scale(1); }
        }

        /* --- TABLERO MONOPOLY (11x11 Grid) --- */
        .board-wrapper {
            flex: 1; display: flex; justify-content: center; align-items: center;
            padding: 20px; overflow: hidden;
        }

        .board-grid {
            width: 85vh; height: 85vh; max-width: 900px; max-height: 900px;
            background: #d4e1cb; border: 4px solid var(--azul-primario);
            display: grid; grid-template-columns: repeat(11, 1fr); grid-template-rows: repeat(11, 1fr);
            gap: 2px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); position: relative;
        }

        .board-tile {
            background: white; border: 1px solid #ccc;
            display: flex; flex-direction: column; justify-content: space-between; align-items: center;
            font-size: 0.6rem; font-weight: bold; text-align: center; position: relative;
            box-sizing: border-box; overflow: hidden; padding-bottom: 2px;
        }
        .tile-name { margin: auto; padding: 2px; line-height: 1.1; }
        
        .color-bar { width: 100%; height: 20%; min-height: 12px; }
        .price-tag { font-size: 0.55rem; color: #555; padding-bottom: 2px; }
        
        /* Contenedor de avatares en cada casilla */
        .avatars-on-tile {
            position: absolute; width: 100%; height: 100%; top:0; left:0;
            display: flex; flex-wrap: wrap; justify-content: center; align-items: center;
            pointer-events: none; background: rgba(255,255,255,0.4); z-index: 5;
        }
        
        /* Animación de salto de avatares */
        .avatar-icon { 
            font-size: 1.4rem; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.5)); 
            animation: hopAnimation 0.2s ease-in-out; 
        }

        @keyframes hopAnimation {
            0% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-15px) scale(1.2); }
            100% { transform: translateY(0) scale(1); }
        }

        /* Casillas de las Esquinas */
        .corner-tile { flex-direction: column; justify-content: center; font-size: 0.75rem; text-transform: uppercase;}

        /* --- Centro del Tablero --- */
        .board-center-logo {
            grid-column: 2 / 11; grid-row: 2 / 11;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0.15; pointer-events: none;
        }
        .board-center-logo img { width: 30%; }
        .board-center-logo h1 { font-family: var(--font-titulares); font-size: 3rem; margin: 0; color: var(--azul-primario);}

        /* --- MODAL DE RETO --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 3000;
            display: none; justify-content: center; align-items: center;
        }

        .tile-card {
            background: var(--blanco-puro); width: 90%; max-width: 450px;
            border-radius: 20px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center; border: 4px solid var(--azul-primario);
        }

        .tile-header { padding: 20px; font-family: var(--font-titulares); font-size: 1.6rem; color: white;}
        .tile-category { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 5px; opacity: 0.9;}
        
        .tile-body { padding: 30px; }
        .challenge-text { font-size: 1.3rem; line-height: 1.6; font-weight: 600; color: #333; margin-bottom: 20px; }
        
        .cost-info { font-size: 1rem; color: #666; margin-bottom: 20px; background: rgba(150, 200, 230, 0.2); padding: 10px; border-radius: 8px;}
        .cost-info span { font-weight: 800; color: var(--azul-primario); }

        .timer-box {
            background: rgba(220, 53, 69, 0.1); color: var(--rojo-alerta);
            padding: 15px; border-radius: 12px; font-family: var(--font-titulares);
            font-size: 2.2rem; margin-bottom: 25px; border: 2px solid var(--rojo-alerta);
        }

        .action-btn {
            background-color: var(--verde-exito); color: white; border: none;
            padding: 18px 20px; font-size: 1.2rem; font-family: var(--font-titulares);
            border-radius: 50px; cursor: pointer; width: 100%; transition: 0.2s; text-transform: uppercase;
        }
        .action-btn:hover { background: #218838; }

        /* --- NOTIFICACIONES --- */
        .notification {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--azul-primario); color: white; padding: 15px 30px; border-radius: 50px;
            font-weight: bold; font-size: 1.1rem; box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            opacity: 0; transition: 0.3s; z-index: 4000; text-align: center;
        }
        .notification.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }
    </style>
</head>
<body>

    <!-- PANTALLA DE LOBBY / LOGIN -->
    <div id="loginOverlay">
        <div class="lobby-box">
            <img src="https://i.imgur.com/s05NqFM.png" alt="Logo">
            <h2>Lobby Multijugador</h2>
            
            <!-- Selector de Avatares Interactivo -->
            <div class="avatar-selector" id="avatarSelector">
                <div class="avatar-option selected" onclick="selectAvatar(this, '👦')">👦</div>
                <div class="avatar-option" onclick="selectAvatar(this, '👧')">👧</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🦊')">🦊</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🐼')">🐼</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🐯')">🐯</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🐶')">🐶</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🐰')">🐰</div>
                <div class="avatar-option" onclick="selectAvatar(this, '🤖')">🤖</div>
            </div>

            <div class="add-player-row">
                <input type="text" id="inputName" class="login-input" placeholder="Nombre del Alumno" autocomplete="off">
                <input type="text" id="inputId" class="login-input" placeholder="ID (Ej: P001)" autocomplete="off" style="width:100px; flex:none;">
                <button class="add-btn" onclick="addPlayer()">Añadir</button>
            </div>
            
            <ul class="player-list-setup" id="setupPlayerList">
                <!-- Lista de jugadores se inserta aquí -->
            </ul>

            <button class="start-btn" id="startBtn" onclick="startGame()" disabled>Iniciar Juego</button>
        </div>
    </div>

    <header>
        <h1>Global Village <span>Monopoly</span></h1>
    </header>

    <div class="main-layout">
        
        <!-- PANEL LATERAL -->
        <div class="sidebar">
            <h3 style="font-family: var(--font-titulares); color: var(--azul-primario); margin-top: 0; text-align: center; border-bottom: 2px solid #eee; padding-bottom:10px;">Players</h3>
            
            <div class="players-container" id="playersDashboardList">
                <!-- Tarjetas de jugadores generadas en JS -->
            </div>
            
            <div class="dice-section">
                <div class="dice-icon" id="diceIcon">🎲</div>
                <button class="dice-btn" id="diceBtn" onclick="rollDice()">Roll Dice</button>
            </div>
        </div>

        <!-- ÁREA DEL TABLERO -->
        <div class="board-wrapper">
            <div class="board-grid" id="boardGrid">
                <!-- Casillas generadas en JS -->
                <div class="board-center-logo">
                    <img src="https://i.imgur.com/s05NqFM.png" alt="Logo">
                    <h1>TEACHER IVAN HUB</h1>
                </div>
            </div>
        </div>

    </div>

    <!-- MODAL DE RETO -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="tile-card" id="tileCard">
            <div class="tile-header" id="tileHeader">
                <span class="tile-category" id="tileCategory">Category</span>
                <span id="tileName">Tile Name</span>
            </div>
            <div class="tile-body">
                <h3 id="modalPlayerTurn" style="margin-top:0; color:var(--naranja-vibrante);">Turno de: <span></span></h3>
                <div class="timer-box" id="timerBox">⏱️ <span id="timeDisplay">20.0</span>s</div>
                <div class="challenge-text" id="challengeText">Prompt</div>
                <div class="cost-info" id="costInfo">
                    Cost: <span id="tileCost">0</span> | Rent: <span id="tileRent">0</span>
                </div>
                <button class="action-btn" id="actionBtn" onclick="completeChallenge()">Complete</button>
            </div>
        </div>
    </div>

    <div class="notification" id="notificationBox">Message</div>

    <script>
        // ==========================================
        // CONFIGURACIÓN Y BASE DE DATOS (40 TILES)
        // ==========================================
        const API_URL = "https://script.google.com/macros/s/AKfycbynFDCGHDtv5gZQAcV_b2wRqwx-ldhUFAap3kdVeFaoq1Ycca1_B0eGK07cI9uhNfg8Aw/exec"; 
        const GOAL = 2000;
        const TIME_LIMIT = 20; 
        const PENALTY = 50; 
        
        let selectedAvatar = '👦'; // Avatar por defecto
        let players = [];
        let currentTurnIndex = 0;
        
        let timerInterval;
        let timeRemaining;
        let currentTileData = null;

        const boardData = [
            { id:1, name:"Start/Go", cat:"System", col:"#C8CDD2", cst:0, rnt:0, ch:"Collect 200 passing Go." },
            { id:2, name:"The Airport", cat:"Survival", col:"var(--prop-brown)", cst:60, rnt:10, ch:"Order a flight ticket to London." },
            { id:3, name:"The QR Bistro", cat:"Survival", col:"var(--prop-brown)", cst:60, rnt:10, ch:"Order a burger and water politely." },
            { id:4, name:"Time Trap", cat:"Penalty", col:"#555", cst:0, rnt:0, ch:"Automatic time deduction zone! Lose 50." },
            { id:5, name:"Speaking St.", cat:"Transport", col:"#333", cst:150, rnt:25, ch:"Talk about your routine for 15 seconds." },
            { id:6, name:"The Bedroom", cat:"Daily R.", col:"var(--prop-lblue)", cst:100, rnt:30, ch:"Describe 3 objects in your bedroom." },
            { id:7, name:"The Kitchen", cat:"Daily R.", col:"var(--prop-lblue)", cst:100, rnt:30, ch:"Explain how to make a sandwich." },
            { id:8, name:"Fluency Boost", cat:"Luck", col:"var(--naranja-vibrante)", cst:0, rnt:0, ch:"You spoke perfectly! Collect 100 Bs." },
            { id:9, name:"The Gym", cat:"Daily R.", col:"var(--prop-lblue)", cst:120, rnt:40, ch:"Name 5 action verbs related to sports." },
            { id:10, name:"Silent Zone", cat:"Jail", col:"var(--rojo-alerta)", cst:0, rnt:0, ch:"Trapped! Spell 'ENVIRONMENT' in 10s." },
            { id:11, name:"Tech Startup", cat:"Pro", col:"var(--prop-pink)", cst:140, rnt:50, ch:"Pitch a crazy app idea using conditionals." },
            { id:12, name:"Wi-Fi", cat:"Utility", col:"#6c757d", cst:150, rnt:0, ch:"Explain what you use the internet for." },
            { id:13, name:"PR Crisis", cat:"Pro", col:"var(--prop-pink)", cst:140, rnt:50, ch:"Apologize formally for a late delivery." },
            { id:14, name:"Boardroom", cat:"Pro", col:"var(--prop-pink)", cst:160, rnt:60, ch:"Use a contrast connector in a sentence." },
            { id:15, name:"Listening St.", cat:"Transport", col:"#333", cst:150, rnt:25, ch:"Listen to a classmate and repeat." },
            { id:16, name:"Hotel Recept.", cat:"Travel", col:"var(--prop-orange)", cst:180, rnt:70, ch:"Book a double room for three nights." },
            { id:17, name:"Fluency Boost", cat:"Luck", col:"var(--naranja-vibrante)", cst:0, rnt:0, ch:"Great vocabulary! Collect 100 Bs." },
            { id:18, name:"Uyuni Salt Flat", cat:"Travel", col:"var(--prop-orange)", cst:180, rnt:70, ch:"Describe this landscape using 3 adjectives." },
            { id:19, name:"Souvenir Shop", cat:"Travel", col:"var(--prop-orange)", cst:200, rnt:80, ch:"Ask for the price of a craft and negotiate." },
            { id:20, name:"Free Parking", cat:"System", col:"#28a745", cst:0, rnt:0, ch:"Take a deep breath. No challenges here." },
            { id:21, name:"Classroom", cat:"Academics", col:"var(--prop-red)", cst:220, rnt:90, ch:"Ask a polite question using 'Could I...'." },
            { id:22, name:"Grammar Trap", cat:"Penalty", col:"#555", cst:0, rnt:0, ch:"Forgot the 3rd person 'S'! Lose 50." },
            { id:23, name:"Science Lab", cat:"Academics", col:"var(--prop-red)", cst:220, rnt:90, ch:"Explain a process using First, Then, Finally." },
            { id:24, name:"School Library", cat:"Academics", col:"var(--prop-red)", cst:240, rnt:100, ch:"Recommend a book using the past tense." },
            { id:25, name:"Reading St.", cat:"Transport", col:"#333", cst:150, rnt:25, ch:"Read a paragraph with perfect intonation." },
            { id:26, name:"Tiwanaku", cat:"History", col:"var(--prop-yellow)", cst:260, rnt:110, ch:"Describe a past event using Past Simple." },
            { id:27, name:"Chaco Museum", cat:"History", col:"var(--prop-yellow)", cst:260, rnt:110, ch:"Use 'used to' to describe past living." },
            { id:28, name:"Low Battery", cat:"Utility", col:"#6c757d", cst:150, rnt:0, ch:"Ask to borrow a charger using modals." },
            { id:29, name:"Sucre Plaza", cat:"History", col:"var(--prop-yellow)", cst:280, rnt:120, ch:"Give directions to the nearest bank." },
            { id:30, name:"Go To Jail", cat:"Penalty", col:"var(--rojo-alerta)", cst:0, rnt:0, ch:"Internet crashed! Go to The Silent Zone." },
            { id:31, name:"HUB Dashboard", cat:"Tech", col:"var(--prop-green)", cst:300, rnt:130, ch:"Explain how to log into the platform." },
            { id:32, name:"Digital Register", cat:"Tech", col:"var(--prop-green)", cst:300, rnt:130, ch:"Report grades highlighting 'Saber' & 'Hacer'." },
            { id:33, name:"Grammar Bug", cat:"Luck", col:"var(--rojo-alerta)", cst:0, rnt:0, ch:"Said 'I am agree'. Lose 50 Bs." },
            { id:34, name:"HTML Sandbox", cat:"Tech", col:"var(--prop-green)", cst:320, rnt:150, ch:"Give a direct command using imperatives." },
            { id:35, name:"Writing St.", cat:"Transport", col:"#333", cst:150, rnt:25, ch:"Write a 5-word sentence in 10 seconds." },
            { id:36, name:"Fluency Boost", cat:"Luck", col:"var(--naranja-vibrante)", cst:0, rnt:0, ch:"Nailed the connector! Collect 100 Bs." },
            { id:37, name:"Debate Stage", cat:"Advanced", col:"var(--prop-dblue)", cst:350, rnt:175, ch:"Give your opinion on a trend in 20s." },
            { id:38, name:"Trans. Tax", cat:"Penalty", col:"#555", cst:0, rnt:0, ch:"Translated directly from Spanish! Lose 50." },
            { id:39, name:"Masterclass", cat:"Advanced", col:"var(--prop-dblue)", cst:400, rnt:200, ch:"Persuade the class with advanced vocab." },
            { id:40, name:"Grad Gala", cat:"Advanced", col:"var(--prop-dblue)", cst:400, rnt:200, ch:"Give a short thank you speech!" }
        ];

        // ==========================================
        // FUNCIONES DE INICIO (LOBBY & TABLERO)
        // ==========================================

        function selectAvatar(element, icon) {
            document.querySelectorAll('.avatar-option').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            selectedAvatar = icon;
        }

        function addPlayer() {
            const name = document.getElementById('inputName').value.trim();
            const pid = document.getElementById('inputId').value.trim();
            
            if(!name || !pid) { alert("Ingresa Nombre e ID."); return; }
            if(players.length >= 6) { alert("Máximo 6 jugadores."); return; }
            
            players.push({ id: pid, name: name, balance: 0, position: 0, avatar: selectedAvatar });
            
            const li = document.createElement('li');
            li.innerHTML = `<div><span class="setup-avatar-display">${selectedAvatar}</span> <span>${name}</span></div> <span>ID: ${pid}</span>`;
            document.getElementById('setupPlayerList').appendChild(li);
            
            document.getElementById('inputName').value = '';
            document.getElementById('inputId').value = '';
            document.getElementById('startBtn').disabled = false;
        }

        function startGame() {
            document.getElementById('loginOverlay').style.display = 'none';
            buildBoard();
            renderPlayersDashboard();
            updateBoardAvatars();
            highlightActivePlayer();
        }

        function getGridPos(index) {
            if(index === 0) return { r: 11, c: 11 };
            if(index < 10) return { r: 11, c: 11 - index };
            if(index === 10) return { r: 11, c: 1 };
            if(index < 20) return { r: 11 - (index - 10), c: 1 };
            if(index === 20) return { r: 1, c: 1 };
            if(index < 30) return { r: 1, c: 1 + (index - 20) };
            if(index === 30) return { r: 1, c: 11 };
            if(index < 40) return { r: 1 + (index - 30), c: 11 };
        }

        function buildBoard() {
            const grid = document.getElementById('boardGrid');
            boardData.forEach((tile, index) => {
                const pos = getGridPos(index);
                const isCorner = (index % 10 === 0);
                
                const div = document.createElement('div');
                div.className = 'board-tile' + (isCorner ? ' corner-tile' : '');
                div.style.gridRow = pos.r;
                div.style.gridColumn = pos.c;
                div.id = 'tile-' + index;

                let colorHtml = '';
                if(!isCorner) {
                    let barStyle = `background-color: ${tile.col};`;
                    if(index < 10) barStyle += 'position:absolute; top:0; width:100%; height:20%;'; 
                    else if(index < 20) barStyle += 'position:absolute; right:0; width:20%; height:100%;'; 
                    else if(index < 30) barStyle += 'position:absolute; bottom:0; width:100%; height:20%;'; 
                    else barStyle += 'position:absolute; left:0; width:20%; height:100%;'; 
                    colorHtml = `<div style="${barStyle}"></div>`;
                } else {
                    div.style.backgroundColor = '#e0e8e3'; 
                }

                div.innerHTML = `
                    ${colorHtml}
                    <div class="tile-name" style="z-index:2; ${isCorner ? 'font-size:0.8rem;' : ''}">${tile.name}</div>
                    ${!isCorner && tile.cst > 0 ? `<div class="price-tag" style="z-index:2;">${tile.cst} Bs</div>` : ''}
                    <div class="avatars-on-tile" id="avatars-${index}"></div>
                `;
                grid.appendChild(div);
            });
        }

        function renderPlayersDashboard() {
            const container = document.getElementById('playersDashboardList');
            container.innerHTML = '';
            players.forEach((p, i) => {
                container.innerHTML += `
                    <div class="player-card" id="pcard-${i}">
                        <div class="p-avatar">${p.avatar}</div>
                        <div class="p-info">
                            <div class="p-name">${p.name}</div>
                            <div class="p-balance" id="pbal-${i}">${p.balance} Bs</div>
                        </div>
                    </div>
                `;
            });
        }

        function highlightActivePlayer() {
            document.querySelectorAll('.player-card').forEach(c => c.classList.remove('active-turn'));
            document.getElementById(`pcard-${currentTurnIndex}`).classList.add('active-turn');
        }

        function updateBoardAvatars() {
            for(let i=0; i<40; i++) { document.getElementById(`avatars-${i}`).innerHTML = ''; }
            players.forEach(p => {
                const avaDiv = document.createElement('div');
                avaDiv.className = 'avatar-icon';
                avaDiv.textContent = p.avatar;
                document.getElementById(`avatars-${p.position}`).appendChild(avaDiv);
            });
        }

        function showNotification(msg, isError = false) {
            const notif = document.getElementById('notificationBox');
            notif.textContent = msg;
            notif.style.backgroundColor = isError ? "var(--rojo-alerta)" : "var(--azul-primario)";
            notif.classList.add('show');
            setTimeout(() => { notif.classList.remove('show'); }, 3000);
        }

        // ==========================================
        // LÓGICA DE TURNOS Y API (CORRECCIÓN DE BUG)
        // ==========================================

        async function updateBalanceInDatabase(amount) {
            const pIndex = currentTurnIndex; // Guardamos el índice exacto para evitar conflictos de asincronía
            const p = players[pIndex];
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'updateBalance', playerId: p.id, amount: amount })
                });
                const data = await response.json();
                
                if(data.status === "success") {
                    p.balance = data.newBalance;
                    document.getElementById(`pbal-${pIndex}`).textContent = `${p.balance} Bs`;
                    checkWin(p);
                }
            } catch (error) {
                // Modo Offline Fallback
                p.balance += amount;
                if(p.balance < 0) p.balance = 0;
                document.getElementById(`pbal-${pIndex}`).textContent = `${p.balance} Bs`;
                checkWin(p);
            }
        }

        function checkWin(player) {
            if (player.balance >= GOAL) {
                document.getElementById('modalOverlay').style.display = 'flex';
                document.getElementById('tileCard').innerHTML = `
                    <div style="padding: 30px;">
                        <h1 style="color: var(--verde-exito); font-size: 4rem; margin: 0;">🏆</h1>
                        <h2 style="color: var(--azul-primario); font-family: var(--font-titulares); font-size: 2rem;">¡${player.name} WINS!</h2>
                        <p style="font-size: 1.1rem; color: #555;">Ha alcanzado los <strong>${GOAL} Tokens</strong> de fluidez.</p>
                    </div>`;
            }
        }

        function rollDice() {
            const diceBtn = document.getElementById('diceBtn');
            const diceIcon = document.getElementById('diceIcon');
            
            diceBtn.disabled = true;
            diceIcon.classList.add('dice-rolling');
            
            setTimeout(() => {
                diceIcon.classList.remove('dice-rolling');
                const steps = Math.floor(Math.random() * 6) + 1;
                const faces = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
                diceIcon.textContent = faces[steps - 1];
                
                moveActivePlayer(steps);
            }, 600);
        }

        async function moveActivePlayer(steps) {
            let p = players[currentTurnIndex];
            
            // Animación paso a paso
            for(let i = 0; i < steps; i++) {
                p.position = (p.position + 1) % 40;
                
                // Pasar por Salida
                if(p.position === 0) {
                    updateBalanceInDatabase(200); 
                    showNotification(`${p.name} passed GO! +200 Bs`);
                }

                updateBoardAvatars();
                await new Promise(r => setTimeout(r, 200)); // Delay para la animación de salto
            }

            // Chequeo de Go To Jail después del movimiento
            if(p.position === 30) {
                await new Promise(r => setTimeout(r, 400)); // Pequeña pausa dramática
                p.position = 10;
                updateBoardAvatars();
                showNotification(`${p.name} went to the Silent Zone!`, true);
                await new Promise(r => setTimeout(r, 400));
            }

            setTimeout(() => {
                currentTileData = boardData[p.position];
                openChallengeModal(currentTileData, p.name);
            }, 300);
        }

        function openChallengeModal(tile, pName) {
            const card = document.getElementById('tileCard');
            document.getElementById('modalPlayerTurn').innerHTML = `Turno de: <span>${pName}</span>`;
            document.getElementById('tileCategory').textContent = tile.cat;
            document.getElementById('tileName').textContent = tile.name;
            document.getElementById('tileHeader').style.backgroundColor = tile.col;
            document.getElementById('challengeText').textContent = tile.ch;
            card.style.borderColor = tile.col; 
            
            if (tile.cst > 0) {
                document.getElementById('costInfo').innerHTML = `Cost: <span>${tile.cst} Bs</span> | Rent: <span>${tile.rnt} Bs</span>`;
                document.getElementById('actionBtn').textContent = "Complete";
            } else {
                document.getElementById('costInfo').innerHTML = `Action Tile`;
                document.getElementById('actionBtn').textContent = "Acknowledge";
            }

            document.getElementById('modalOverlay').style.display = 'flex';
            startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval);
            timeRemaining = currentTileData.cat === "Jail" ? 10 : TIME_LIMIT; 
            
            const timeDisplay = document.getElementById('timeDisplay');
            const timerBox = document.getElementById('timerBox');
            
            timerBox.style.borderColor = "var(--azul-primario)";
            timerBox.style.color = "var(--azul-primario)";
            timerBox.style.backgroundColor = "rgba(10, 70, 140, 0.1)";

            timerInterval = setInterval(() => {
                timeRemaining -= 0.1;
                timeDisplay.textContent = timeRemaining.toFixed(1);

                if (timeRemaining <= 5) {
                    timerBox.style.borderColor = "var(--rojo-alerta)";
                    timerBox.style.color = "var(--rojo-alerta)";
                    timerBox.style.backgroundColor = "rgba(220, 53, 69, 0.1)";
                }

                if (timeRemaining <= 0) {
                    clearInterval(timerInterval);
                    timeDisplay.textContent = "0.0";
                    applyTimePenalty();
                }
            }, 100);
        }

        function applyTimePenalty() {
            updateBalanceInDatabase(-PENALTY);
            showNotification(`⏰ Time out! Penalty: -${PENALTY} Bs.`, true);
            endTurn();
        }

        function completeChallenge() {
            clearInterval(timerInterval);
            
            let reward = 0;
            if(currentTileData.cst > 0) reward = currentTileData.cst;
            else if(currentTileData.cat === "Luck") reward = 100;
            else if(currentTileData.cat === "Penalty") reward = -50;
            
            if(reward !== 0) updateBalanceInDatabase(reward);
            
            if(reward > 0) showNotification(`✅ Success! Earned ${reward} Bs.`);
            if(reward < 0) showNotification(`⚠️ Penalty! Lost ${Math.abs(reward)} Bs.`, true);
            
            endTurn();
        }

        function endTurn() {
            document.getElementById('modalOverlay').style.display = 'none';
            
            // Pasar turno
            currentTurnIndex = (currentTurnIndex + 1) % players.length;
            highlightActivePlayer();
            
            document.getElementById('diceIcon').textContent = '🎲';
            document.getElementById('diceBtn').disabled = false;
        }
    </script>
</body>
</html>
