<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Analyzer | Teacher Ivan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root {
            --primary-teal: #5dcbc3;
            --primary-dark: #3aa39b;
            --accent-coral: #ff9a8b;
            --text-dark: #2d2d2d;
            --bg-light: #f4f7f6;
            --white: #ffffff;
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
            --radius: 16px;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            min-height: 100vh;
        }

        /* HEADER */
        header {
            background: var(--text-dark);
            padding: 2rem;
            text-align: center;
            border-bottom: 5px solid var(--primary-teal);
            box-shadow: var(--shadow);
            position: relative;
            color: white;
        }
        
        .back-link { position: absolute; top: 20px; left: 20px; text-decoration: none; color: #a5b1c2; font-weight: 600; transition: 0.2s;}
        .back-link:hover { color: var(--primary-teal); }
        h1 { margin: 0; font-size: 2.2rem; color: white; display: flex; align-items: center; justify-content: center; gap: 10px;}
        .subtitle { color: #d1d8e0; margin-top: 5px; font-weight: 300; }

        /* MAIN CONTAINER */
        .container { max-width: 1200px; margin: 30px auto 50px; width: 95%; }

        /* SONG SELECTOR */
        .song-selector {
            display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 20px;
            scrollbar-width: thin; scrollbar-color: var(--primary-teal) #eee;
        }
        .song-selector::-webkit-scrollbar { height: 8px; }
        .song-selector::-webkit-scrollbar-thumb { background-color: var(--primary-teal); border-radius: 10px; }
        
        .song-btn {
            background: white; border: 2px solid transparent; padding: 10px 20px; border-radius: 50px;
            font-family: 'Poppins', sans-serif; font-weight: 600; color: #666; cursor: pointer;
            white-space: nowrap; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; align-items: center; gap: 8px;
        }
        .song-btn:hover { border-color: var(--primary-teal); }
        .song-btn.active {
            background: var(--primary-teal); color: white; transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(93, 203, 195, 0.4); border-color: var(--primary-teal);
        }

        /* TWO COLUMN LAYOUT */
        .analyzer-layout {
            display: grid; grid-template-columns: 1fr 1.2fr; gap: 30px; align-items: start;
        }

        @media (max-width: 900px) {
            .analyzer-layout { grid-template-columns: 1fr; }
            .video-section { position: static !important; }
        }

        /* VIDEO SECTION (STICKY) */
        .video-section {
            background: white; padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow);
            border-top: 5px solid var(--accent-coral); position: sticky; top: 20px;
        }
        .video-wrapper {
            position: relative; padding-bottom: 56.25%; height: 0; border-radius: 10px; overflow: hidden; background: #000;
        }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .song-info { margin-top: 15px; text-align: center; }
        .song-title { font-size: 1.4rem; font-weight: 700; color: var(--text-dark); margin: 0; }
        .song-artist { font-size: 1rem; color: #777; margin: 5px 0 0 0; }

        /* LYRICS SECTION */
        .lyrics-section {
            background: white; padding: 40px; border-radius: var(--radius); box-shadow: var(--shadow);
            border-top: 5px solid var(--primary-teal);
        }
        .instructions {
            background: #f0f8f8; padding: 15px; border-left: 4px solid var(--primary-teal);
            border-radius: 8px; font-size: 0.95rem; color: #444; margin-bottom: 25px;
        }

        .lyrics-content {
            font-family: 'Merriweather', serif; font-size: 1.2rem; line-height: 2.5; color: #333;
        }

        .gap-input {
            width: 120px; padding: 5px 10px; border: 2px solid #ccc; border-radius: 6px;
            font-family: 'Poppins', sans-serif; font-weight: bold; text-align: center;
            outline: none; transition: 0.3s; font-size: 1rem; margin: 0 5px; background: #fafafa;
        }
        .gap-input:focus { border-color: var(--primary-teal); background: white; box-shadow: 0 0 0 3px rgba(93,203,195,0.2);}
        
        .gap-input.correct { border-color: #10b981; background: #d1fae5; color: #065f46; pointer-events: none;}
        .gap-input.wrong { border-color: #ef4444; background: #fee2e2; color: #991b1b; }
        
        .correction-text { font-size: 0.8rem; color: #ef4444; font-weight: bold; display: inline-block; position: absolute; transform: translateY(20px); margin-left: -120px;}

        /* BUTTONS & FEEDBACK */
        .btn-check {
            background: var(--text-dark); color: white; border: none; padding: 15px 40px; border-radius: 50px;
            font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.3s; width: 100%; font-family: 'Poppins', sans-serif; margin-top: 30px;
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .btn-check:hover { background: #444; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.2);}

        .feedback-box {
            margin-top: 20px; padding: 15px; border-radius: 12px; font-weight: 600; text-align: center; display: none; font-size: 1.1rem;
        }
        .success { background: #d1fae5; color: #065f46; border: 1px solid #10b981; }
        .danger { background: #fee2e2; color: #991b1b; border: 1px solid #ef4444; }

    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-link">← Return to HUB</a>
        <h1><span class="material-icons-round">queue_music</span> The Song Analyzer</h1>
        <div class="subtitle">Listen carefully and fill in the missing lyrics</div>
    </header>

    <div class="container">
        
        <div class="song-selector" id="song-tabs">
            </div>

        <div class="analyzer-layout">
            
            <div class="video-section">
                <div class="video-wrapper">
                    <iframe id="yt-player" src="" allowfullscreen></iframe>
                </div>
                <div class="song-info">
                    <h2 class="song-title" id="display-title">Loading...</h2>
                    <p class="song-artist" id="display-artist">Loading...</p>
                </div>
            </div>

            <div class="lyrics-section">
                <div class="instructions">
                    <strong>🎧 Instructions:</strong> Play the video and listen closely. Type the missing words into the boxes. Make sure your spelling is correct!
                </div>
                
                <div class="lyrics-content" id="lyrics-container">
                    </div>

                <button class="btn-check" id="check-btn" onclick="checkAnswers()">Check Lyrics <span class="material-icons-round">spellcheck</span></button>
                <div id="feedback-display" class="feedback-box"></div>
            </div>

        </div>

    </div>

    <script>
        // DATABASE: 10 Popular Songs
        // Format: Use [word] to create a gap in the lyrics.
        const songDatabase = [
            {
                title: "Shape of You",
                artist: "Ed Sheeran",
                youtubeId: "JGwWNGJdvx8", // Official Audio/Video
                lyrics: `The [club] isn't the best place to find a lover<br>
                        So the bar is where I go<br>
                        Me and my [friends] at the table doing shots<br>
                        Drinking fast and then we talk slow<br><br>
                        Come over and start up a [conversation] with just me<br>
                        And trust me I'll give it a chance now<br>
                        Take my hand, stop, put Van the Man on the [jukebox]<br>
                        And then we start to dance, and now I'm singing like<br><br>
                        Girl, you know I want your [love]<br>
                        Your love was handmade for somebody like me<br>
                        Come on now, follow my lead<br>
                        I may be crazy, don't [mind] me`
            },
            {
                title: "Yellow",
                artist: "Coldplay",
                youtubeId: "yKNxeF4KMsY",
                lyrics: `Look at the [stars]<br>
                        Look how they [shine] for you<br>
                        And everything you do<br>
                        Yeah, they were all [yellow]<br><br>
                        I came along<br>
                        I wrote a [song] for you<br>
                        And all the things you do<br>
                        And it was called Yellow<br><br>
                        So then I took my [turn]<br>
                        Oh, what a thing to have done<br>
                        And it was all yellow`
            },
            {
                title: "Someone Like You",
                artist: "Adele",
                youtubeId: "hLQl3WQQoQ0",
                lyrics: `I [heard] that you're settled down<br>
                        That you found a girl and you're [married] now<br>
                        I heard that your dreams came [true]<br>
                        Guess she gave you things, I didn't give to you<br><br>
                        Old friend, why are you so shy?<br>
                        Ain't like you to hold back or hide from the [light]<br><br>
                        I hate to turn up out of the [blue], uninvited<br>
                        But I couldn't stay away, I couldn't fight it<br>
                        I had hoped you'd see my face<br>
                        And that you'd be [reminded] that for me, it isn't over`
            },
            {
                title: "Let It Be",
                artist: "The Beatles",
                youtubeId: "QDYfEBY9NM4",
                lyrics: `When I find myself in times of [trouble]<br>
                        Mother Mary comes to me<br>
                        Speaking words of [wisdom], let it be<br><br>
                        And in my hour of [darkness]<br>
                        She is standing right in front of me<br>
                        Speaking words of wisdom, let it [be]<br><br>
                        Let it be, let it be<br>
                        Let it be, let it be<br>
                        Whisper [words] of wisdom, let it be`
            },
            {
                title: "Levitating",
                artist: "Dua Lipa",
                youtubeId: "TUVcZfQe-Kw",
                lyrics: `If you wanna run away with me, I know a [galaxy]<br>
                        And I can take you for a ride<br>
                        I had a [premonition] that we fell into a rhythm<br>
                        Where the music don't stop for life<br><br>
                        Glitter in the sky, glitter in my [eyes]<br>
                        Shining just the way I like<br>
                        If you're feeling like you need a little bit of [company]<br>
                        You met me at the perfect time<br><br>
                        You want me, I want you, baby<br>
                        My sugarboo, I'm [levitating]<br>
                        The Milky Way, we're renegading`
            },
            {
                title: "Believer",
                artist: "Imagine Dragons",
                youtubeId: "7wtfhZwyrcc",
                lyrics: `First things first<br>
                        I'ma say all the [words] inside my head<br>
                        I'm fired up and tired of the way that things have been, oh-ooh<br>
                        The way that [things] have been, oh-ooh<br><br>
                        Second thing second<br>
                        Don't you tell me what you think that I could be<br>
                        I'm the one at the [sail], I'm the master of my sea, oh-ooh<br>
                        The master of my [sea], oh-ooh<br><br>
                        I was broken from a young age<br>
                        Taking my sulking to the masses<br>
                        Writing my [poems] for the few`
            },
            {
                title: "Just The Way You Are",
                artist: "Bruno Mars",
                youtubeId: "LjhCEhWiKXk",
                lyrics: `Oh, her [eyes], her eyes<br>
                        Make the stars look like they're not shinin'<br>
                        Her hair, her [hair]<br>
                        Falls perfectly without her tryin'<br>
                        She's so [beautiful] and I tell her everyday<br><br>
                        Yeah, I know, I know<br>
                        When I compliment her, she won't [believe] me<br>
                        And it's so, it's so<br>
                        Sad to think that she don't see what I [see]<br>
                        But every time she asks me, "Do I look okay?"<br>
                        I say`
            },
            {
                title: "Love Story",
                artist: "Taylor Swift",
                youtubeId: "8xg3vE8Ie_E",
                lyrics: `We were both [young] when I first saw you<br>
                        I close my eyes and the [flashback] starts<br>
                        I'm standin' there<br>
                        On a balcony in summer air<br><br>
                        See the lights, see the party, the ball gowns<br>
                        See you make your way through the [crowd]<br>
                        And say, "Hello"<br>
                        Little did I [know]<br><br>
                        That you were Romeo, you were throwin' [pebbles]<br>
                        And my daddy said, "Stay away from Juliet"`
            },
            {
                title: "Flowers",
                artist: "Miley Cyrus",
                youtubeId: "G7KNmW9a75Y",
                lyrics: `We were good, we were [gold]<br>
                        Kinda dream that can't be sold<br>
                        We were right 'til we weren't<br>
                        Built a [home] and watched it burn<br><br>
                        Mm, I didn't wanna leave you<br>
                        I didn't wanna [lie]<br>
                        Started to cry but then remembered I<br><br>
                        I can buy myself [flowers]<br>
                        Write my name in the sand<br>
                        Talk to myself for [hours]<br>
                        Say things you don't understand`
            },
            {
                title: "We Are The Champions",
                artist: "Queen",
                youtubeId: "04854XqcfCY",
                lyrics: `I've paid my [dues]<br>
                        Time after time<br>
                        I've done my sentence<br>
                        But committed no [crime]<br><br>
                        And bad [mistakes]<br>
                        I've made a few<br>
                        I've had my share of sand kicked in my [face]<br>
                        But I've come through<br><br>
                        We are the [champions], my friends<br>
                        And we'll keep on fighting 'til the end`
            }
        ];

        let currentSongIndex = 0;

        // Initialize App
        function initApp() {
            const tabsContainer = document.getElementById('song-tabs');
            
            // Generate Tabs
            songDatabase.forEach((song, index) => {
                const btn = document.createElement('button');
                btn.className = `song-btn ${index === 0 ? 'active' : ''}`;
                btn.innerHTML = `<span class="material-icons-round" style="font-size: 1.2rem;">music_note</span> ${song.artist}`;
                btn.onclick = (e) => loadSong(index, e.currentTarget);
                tabsContainer.appendChild(btn);
            });

            // Load first song
            loadSong(0, tabsContainer.firstChild);
        }

        // Load specific song
        function loadSong(index, btnElement) {
            currentSongIndex = index;
            const song = songDatabase[index];

            // Update Tabs UI
            document.querySelectorAll('.song-btn').forEach(btn => btn.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');

            // Update Video and Info
            document.getElementById('yt-player').src = `https://www.youtube.com/embed/${song.youtubeId}`;
            document.getElementById('display-title').innerText = song.title;
            document.getElementById('display-artist').innerText = song.artist;

            // Parse Lyrics (Convert [word] into inputs)
            // Regex captures everything inside brackets []
            const parsedLyrics = song.lyrics.replace(/\[(.*?)\]/g, (match, p1) => {
                // Return an input field with the correct answer stored in data-ans
                return `<input type="text" class="gap-input" data-ans="${p1.toLowerCase()}">`;
            });

            document.getElementById('lyrics-container').innerHTML = parsedLyrics;
            
            // Reset Feedback and Button
            document.getElementById('feedback-display').style.display = "none";
            document.getElementById('check-btn').style.display = "flex";
        }

        // Check Answers
        function checkAnswers() {
            const inputs = document.querySelectorAll('.gap-input');
            let score = 0;
            let total = inputs.length;
            let allFilled = true;

            // Remove previous correction texts if they exist
            document.querySelectorAll('.correction-text').forEach(el => el.remove());

            inputs.forEach(input => {
                if(input.value.trim() === "") allFilled = false;
            });

            if (!allFilled) {
                alert("Please fill in all the blanks before checking!");
                return;
            }

            inputs.forEach(input => {
                const correctAnswer = input.getAttribute('data-ans');
                const studentAnswer = input.value.trim().toLowerCase();

                input.classList.remove('correct', 'wrong');

                if (studentAnswer === correctAnswer) {
                    input.classList.add('correct');
                    score++;
                } else {
                    input.classList.add('wrong');
                    // Show correct answer below
                    const span = document.createElement('span');
                    span.className = 'correction-text';
                    span.innerText = correctAnswer;
                    input.parentNode.insertBefore(span, input.nextSibling);
                }
            });

            // Feedback
            const feedback = document.getElementById('feedback-display');
            feedback.style.display = 'block';
            feedback.className = 'feedback-box';

            if (score === total) {
                feedback.classList.add('success');
                feedback.innerHTML = `🌟 Perfect Score! You got ${score}/${total} words correct. Excellent listening!`;
                document.getElementById('check-btn').style.display = "none";
            } else {
                feedback.classList.add('danger');
                feedback.innerHTML = `You got ${score} out of ${total}. Check the red boxes for the correct words and listen again!`;
            }
        }

        // Start
        window.onload = initApp;

    </script>
</body>
</html>
