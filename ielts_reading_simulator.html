                            <div>
                                <p class="font-serif text-slate-800 text-[0.9rem] mb-2"><strong>12.</strong> Machine learning algorithms are legally responsible if a patient is harmed.</p>
                                <div class="flex gap-2">
                                    <label class="radio-label text-xs flex-1"><input type="radio" name="q12" value="true"> T</label>
                                    <label class="radio-label text-xs flex-1"><input type="radio" name="q12" value="false"> F</label>
                                    <label class="radio-label text-xs flex-1"><input type="radio" name="q12" value="not given"> NG</label>
                                </div>
                            </div>
                            <div>
                                <p class="font-serif text-slate-800 text-[0.9rem] mb-2"><strong>13.</strong> The majority of doctors embrace AI implementation in their clinics.</p>
                                <div class="flex gap-2">
                                    <label class="radio-label text-xs flex-1"><input type="radio" name="q13" value="true"> T</label>
                                    <label class="radio-label text-xs flex-1"><input type="radio" name="q13" value="false"> F</label>
                                    <label class="radio-label text-xs flex-1"><input type="radio" name="q13" value="not given"> NG</label>
                                </div>
                            </div>
                        </div>
                    </div>
                `
            }
        };

        window.onload = () => { loadTest('test1'); };

        function loadTest(testId) {
            if (isExamActive) {
                alert("Please finish your current test before switching.");
                return;
            }

            currentTestId = testId;
            const data = testData[testId];

            document.querySelectorAll('.test-tab').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${testId}`).classList.add('active');
            
            document.getElementById('passage-title').innerText = data.title;
            document.getElementById('questions-content').innerHTML = data.htmlContent;
            document.getElementById('external-text-frame').srcdoc = "<div style='font-family:sans-serif; padding:20px; text-align:center; color:#64748b; margin-top:20%; font-size:1.2rem;'>Text locked. Enter Name & Press Start.</div>";

            document.getElementById('exam-blocker').style.display = 'flex';
            document.getElementById('timer-display').textContent = "20:00";
            document.getElementById('timer-display').classList.remove('warning');
            document.getElementById('btn-submit').style.display = 'none';
            document.getElementById('btn-start').style.display = 'flex';
            
            switchMobileView('passage');
        }

        function switchMobileView(view) {
            const btnPassage = document.getElementById('btn-view-passage');
            const btnQuestions = document.getElementById('btn-view-questions');
            const panePassage = document.getElementById('pane-passage');
            const paneQuestions = document.getElementById('pane-questions');

            if (view === 'passage') {
                btnPassage.className = "flex-1 py-2 bg-brand-teal text-white rounded-lg font-bold text-sm shadow-sm transition";
                btnQuestions.className = "flex-1 py-2 bg-slate-50 text-slate-600 border border-slate-300 rounded-lg font-bold text-sm shadow-sm transition";
                panePassage.classList.add('mobile-active-pane'); panePassage.classList.remove('hidden');
                paneQuestions.classList.remove('mobile-active-pane'); paneQuestions.classList.add('hidden');
            } else {
                btnQuestions.className = "flex-1 py-2 bg-brand-teal text-white rounded-lg font-bold text-sm shadow-sm transition";
                btnPassage.className = "flex-1 py-2 bg-slate-50 text-slate-600 border border-slate-300 rounded-lg font-bold text-sm shadow-sm transition";
                paneQuestions.classList.add('mobile-active-pane'); paneQuestions.classList.remove('hidden');
                panePassage.classList.remove('mobile-active-pane'); panePassage.classList.add('hidden');
            }
        }

        function startExam() {
            const nameInput = document.getElementById('student-name').value.trim();
            if (!nameInput) { alert("You must enter your Candidate Name to start."); return; }

            const currentData = testData[currentTestId];
            document.getElementById('external-text-frame').removeAttribute('srcdoc');
            document.getElementById('external-text-frame').src = currentData.fileUrl;

            document.getElementById('exam-blocker').style.display = 'none';
            document.getElementById('btn-start').style.display = 'none';
            document.getElementById('btn-submit').style.display = 'block';
            
            isExamActive = true; timerStarted = true;
            startTimer(1200); 
        }

        function startTimer(duration) {
            let timer = duration;
            const display = document.getElementById('timer-display');
            timerInterval = setInterval(function () {
                let m = parseInt(timer / 60, 10); let s = parseInt(timer % 60, 10);
                display.textContent = (m < 10 ? "0" + m : m) + ":" + (s < 10 ? "0" + s : s);
                if (timer <= 300) display.classList.add('warning');
                if (--timer < 0) { clearInterval(timerInterval); autoSubmit(); }
            }, 1000);
        }

        function autoSubmit() {
            alert("⏰ Time's up! Generating your report..."); submitExam(true);
        }

        function submitExam(isAuto = false) {
            if (!isAuto) { if (!confirm("Are you sure you want to submit your 13 answers?")) return; }

            clearInterval(timerInterval);
            isExamActive = false;
            document.getElementById('btn-submit').style.display = 'none';
            
            const data = testData[currentTestId];
            let studentAnswers = {};
            
            // Collect Answers
            for(let i=1; i<=13; i++) {
                let el = document.getElementById(`q${i}`);
                if(el) { // Select or Text Input
                    studentAnswers[`q${i}`] = el.value.trim().toLowerCase();
                } else { // Radio Buttons
                    let radio = document.querySelector(`input[name="q${i}"]:checked`);
                    studentAnswers[`q${i}`] = radio ? radio.value.toLowerCase() : "not answered";
                }
            }

            let score = 0; const results = {};
            for (let i = 1; i <= 13; i++) {
                let key = `q${i}`;
                if (studentAnswers[key] === data.answers[key]) {
                    score++; results[key] = { status: "Correct" };
                } else {
                    results[key] = { status: "Incorrect" };
                }
            }

            generatePDFReport(studentAnswers, results, score, data);
        }

        function generatePDFReport(studentAnswers, results, score, data) {
            const studentName = document.getElementById('student-name').value.trim() || "Student";
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            doc.setFont("helvetica", "bold"); doc.setFontSize(22); doc.setTextColor(15, 118, 110);
            doc.text(`IELTS Advanced Reading Mock`, 105, 20, null, null, "center");

            doc.setFontSize(12); doc.setFont("helvetica", "italic"); doc.setTextColor(100, 100, 100);
            doc.text(`Candidate: ${studentName.toUpperCase()}`, 105, 30, null, null, "center");
            doc.text(`Module: ${data.title}`, 105, 37, null, null, "center");

            doc.setDrawColor(200, 200, 200); doc.line(20, 45, 190, 45);

            doc.setFont("helvetica", "bold"); doc.setFontSize(18); doc.setTextColor(30, 41, 59);
            doc.text(`Final Score: ${score} / 13`, 105, 60, null, null, "center");

            // Simplified Band Score Estimate (Section 1 roughly)
            let band = "Band 4.0 (Need more practice)";
            if(score === 13) band = "Band 9.0 (Outstanding)";
            else if (score >= 10) band = "Band 7.0 (Good)";
            else if (score >= 7) band = "Band 6.0 (Competent)";
            
            doc.setFontSize(12); doc.setTextColor(score >= 7 ? 15 : 244, score >= 7 ? 118 : 63, score >= 7 ? 110 : 94);
            doc.text(`Estimated Section Performance: ${band}`, 105, 70, null, null, "center");

            doc.setFontSize(14); doc.setTextColor(30, 41, 59); doc.text("Detailed Breakdown:", 20, 85);
            doc.setFontSize(11); doc.setFont("helvetica", "normal");
            
            let y = 95;
            for (let i = 1; i <= 13; i++) {
                if (y > 270) { doc.addPage(); y = 20; } // Handle page break

                let key = `q${i}`;
                let sAns = studentAnswers[key] || "[-]";
                let isCorrect = results[key].status === "Correct";
                
                doc.setTextColor(50, 50, 50); doc.setFont("helvetica", "bold");
                doc.text(`Question ${i}:`, 20, y);
                
                doc.setFont("helvetica", "normal");
                doc.text(`Your Answer: ${sAns.toUpperCase()}`, 50, y);
                
                if (!isCorrect) {
                    doc.setTextColor(244, 63, 94);
                    doc.text(`(Correct: ${data.answers[key].toUpperCase()}) ❌`, 130, y);
                } else {
                    doc.setTextColor(34, 197, 94);
                    doc.text(`✅`, 130, y);
                }
                y += 10;
            }

            doc.save(`${studentName.replace(/\s+/g, '_')}_IELTS_Adv_Reading_${currentTestId}.pdf`);
            
            // Lock inputs
            document.querySelectorAll('input, select').forEach(i => i.disabled = true);
        }
    </script>
</body>
</html>
