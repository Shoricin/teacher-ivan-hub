<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuestionario: Imperio Inca - Colegio Fielding</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --fielding-green: #2E5A27;
            --fielding-gold: #D4AF37;
            --fielding-grey: #4F4F4F;
            --light-bg: #F4F7F2;
            --white: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--light-bg);
            color: var(--fielding-grey);
            line-height: 1.5;
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            background: var(--white);
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-top: 10px solid var(--fielding-green);
        }

        /* Encabezado */
        header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--fielding-gold);
            padding-bottom: 15px;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            color: var(--fielding-green);
            font-size: 2rem;
            margin-bottom: 5px;
            line-height: 1.2;
        }

        .logo-placeholder {
            font-weight: 700;
            color: var(--fielding-gold);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 5px;
            display: block;
            font-size: 0.9rem;
        }

        /* Información del Estudiante */
        .student-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 4px solid var(--fielding-green);
        }

        .input-group label {
            display: block;
            font-weight: 700;
            margin-bottom: 5px;
            color: var(--fielding-green);
            font-size: 0.9rem;
        }

        .input-group input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: 'Montserrat', sans-serif;
        }

        h2 {
            color: var(--fielding-green);
            margin: 20px 0 15px;
            border-left: 5px solid var(--fielding-gold);
            padding-left: 10px;
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
        }

        /* Quiz */
        .question-card {
            background: #fcfcfc;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #eee;
        }

        .question-card p {
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
        }

        .options label {
            display: block;
            margin: 5px 0;
            cursor: pointer;
            padding: 8px;
            border-radius: 4px;
            background: #fff;
            border: 1px solid #ddd;
            font-size: 0.95rem;
            transition: background 0.2s;
        }

        .options label:hover {
            background: #f0f4ef;
        }

        /* Botones */
        .btn {
            display: inline-block;
            background: var(--fielding-green);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            transition: all 0.3s;
            margin-top: 20px;
            font-family: 'Montserrat', sans-serif;
        }

        .btn:hover {
            background: #1e3d1a;
            transform: translateY(-2px);
        }

        .btn-gold {
            background: var(--fielding-gold);
            color: #000;
        }
        
        .btn-gold:hover {
            background: #b5952f;
        }

        /* ESTILOS DE IMPRESIÓN SÚPER COMPACTOS */
        @media print {
            @page {
                margin: 1.5cm;
            }
            body { 
                background: white; 
                font-size: 10pt; /* Letra más pequeña para ahorrar espacio */
                color: #000;
            }
            .container {
                box-shadow: none;
                margin: 0;
                width: 100%;
                max-width: 100%;
                border-top: none;
                padding: 0;
            }
            .no-print, .btn {
                display: none !important;
            }
            header {
                margin-bottom: 10px;
                padding-bottom: 5px;
            }
            header h1 { font-size: 1.4rem; }
            
            .student-box {
                padding: 10px;
                margin-bottom: 15px;
                gap: 10px;
                background: none;
                border: 1px solid #ccc;
                border-left: 4px solid var(--fielding-green);
            }
            
            h2 { margin: 10px 0; font-size: 1.2rem; }

            /* Compactar las preguntas */
            .question-card { 
                page-break-inside: avoid; 
                border: none; 
                padding: 0 0 10px 0; 
                margin-bottom: 10px;
                border-bottom: 1px dashed #ccc;
                background: none;
            }
            
            .question-card p {
                margin-bottom: 5px;
                font-size: 10pt;
            }

            /* Opciones en línea si son cortas para ahorrar saltos de línea */
            .options {
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
            }
            
            .options label { 
                border: none; 
                padding: 0; 
                margin: 0;
                margin-right: 15px;
                background: none;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <span class="logo-placeholder">Colegio Fielding Bolivia</span>
        <h1>Cuestionario: La Caída del Imperio Inca</h1>
        <p>Asignatura: Historia | Prof. Iván Mancilla Copa</p>
    </header>

    <div class="student-box">
        <div class="input-group">
            <label>Nombre Completo:</label>
            <input type="text" placeholder="Escribe tu nombre completo aquí">
        </div>
        <div class="input-group">
            <label>Curso:</label>
            <input type="text" placeholder="Ej. 3ro de Secundaria">
        </div>
    </div>

    <section id="quiz-section">
        <h2>Evaluación de Comprensión Audiovisual</h2>
        
        <div id="quiz-container">
            </div>

        <div style="text-align: center; margin-top: 30px;">
            <button class="btn btn-gold no-print" onclick="window.print()">
                <i class="fa-solid fa-print"></i> Imprimir Cuestionario
            </button>
        </div>
    </section>
</div>

<script>
    // Base de Datos de Preguntas sobre el documental de La Caída del Imperio Inca
    const questions = [
        { 
            q: "¿Qué evento desencadenó principalmente la guerra civil que dividió al Tahuantinsuyo antes de la llegada de los españoles?", 
            options: ["Una rebelión masiva en la costa", "El fallecimiento ocultado del Sapa Inca Huayna Cápac", "La invasión de un ejército desde el sur de Chile"] 
        },
        { 
            q: "¿Con qué pueblo originario, fuertemente resentido por la dominación de Cusco, se enfrentó Atahualpa en el norte llegando a ser capturado por ellos?", 
            options: ["Los Mapuches", "Los Guaraníes", "Los Cañaris"] 
        },
        { 
            q: "Según el mito transmitido por el propio Atahualpa, ¿en qué animal sagrado se transformó gracias al Dios Sol para escapar de su primera prisión?", 
            options: ["En un cóndor de los Andes", "En Amaru (la serpiente sagrada)", "En un puma invencible"] 
        },
        { 
            q: "En el encuentro de Cajamarca (1532), ¿qué factores causaron el mayor pánico y la caída del ejército incaico ante Pizarro?", 
            options: ["El uso sorpresivo de caballos y el estruendo de los arcabuces (armas de fuego)", "Un eclipse solar que oscureció la plaza", "Una traición interna de los generales quiteños"] 
        },
        { 
            q: "¿A qué joven Inca coronó inicialmente Francisco Pizarro para intentar gobernar a través de él, antes de que este iniciara una gran rebelión?", 
            options: ["A Huáscar", "A Manco Inca", "A Túpac Amaru"] 
        },
        { 
            q: "Durante el asedio a Lima comandado por el general Kisu Yupanqui, ¿qué fue decisivo para salvar a las tropas españolas de ser aniquiladas?", 
            options: ["La llegada de un galeón con refuerzos desde España", "El envío de miles de guerreros aliados Huancas solicitados por Inés Huaylas (pareja de Pizarro)", "Una plaga repentina que afectó al ejército inca"] 
        },
        { 
            q: "¿Cuál fue el último refugio geográfico de la resistencia incaica, donde lograron sostener una capital secreta durante décadas?", 
            options: ["Vilcabamba, en la espesura de la selva", "La fortaleza ceremonial de Machu Picchu", "La península de Copacabana en el Lago Titicaca"] 
        },
        { 
            q: "¿Qué virrey del Perú ordenó la captura y posterior ejecución pública de Túpac Amaru I en 1572, cerrando el ciclo de resistencia armada?", 
            options: ["Francisco de Toledo", "Manuel de Amat y Junyent", "Blasco Núñez Vela"] 
        },
        { 
            q: "Tras consolidarse la conquista, ¿qué sucedió con gran parte de la antigua nobleza incaica (panacas reales y ñustas)?", 
            options: ["Fueron desterrados a Centroamérica como prisioneros", "Se aislaron completamente rechazando cualquier contacto", "Se integraron al orden virreinal, casándose con españoles y obteniendo títulos nobiliarios e hidalguías"] 
        },
        { 
            q: "¿Cómo se conoce al estilo artístico mestizo surgido de la síntesis entre el arte religioso europeo y la visión y estética andina?", 
            options: ["Barroco Mestizo o Escuela Cuzqueña", "Renacimiento Quiteño", "Gótico del Altiplano"] 
        }
    ];

    function renderQuiz() {
        const container = document.getElementById('quiz-container');
        questions.forEach((q, i) => {
            const div = document.createElement('div');
            div.className = 'question-card';
            
            // Layout compacto para opciones
            let optionsHTML = q.options.map((opt, optIndex) => `
                <label>
                    <input type="radio" name="q${i}" value="${optIndex}"> 
                    ${opt}
                </label>
            `).join('');

            div.innerHTML = `
                <p>${i+1}. ${q.q}</p>
                <div class="options">
                    ${optionsHTML}
                </div>
            `;
            container.appendChild(div);
        });
    }

    // Renderizar al cargar la página
    document.addEventListener('DOMContentLoaded', renderQuiz);
</script>

</body>
</html>
