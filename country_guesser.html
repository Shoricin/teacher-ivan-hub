<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country & Nationality Guesser | Teacher Ivan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root {
            --primary-teal: #5dcbc3;
            --primary-dark: #3aa39b;
            --accent-coral: #ff9a8b;
            --text-dark: #2d2d2d;
            --bg-light: #f9f9f9;
            --white: #ffffff;
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
            --radius: 20px;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            min-height: 100vh;
        }

        /* HEADER */
        header {
            background: var(--white);
            padding: 2rem;
            text-align: center;
            border-bottom: 5px solid var(--primary-teal);
            box-shadow: var(--shadow);
            position: relative;
        }
        
        .back-link { position: absolute; top: 20px; left: 20px; text-decoration: none; color: #a5b1c2; font-weight: 600; transition: 0.2s;}
        .back-link:hover { color: var(--accent-coral); }
        h1 { margin: 0; font-size: 2.2rem; color: var(--text-dark); display: flex; align-items: center; justify-content: center; gap: 10px;}
        .subtitle { color: #777; margin-top: 5px; font-weight: 300; }

        /* MAIN CONTAINER */
        .container { max-width: 900px; margin: 40px auto; width: 90%; }
        
        /* SCORE BOARD */
        .score-board {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--primary-teal); color: white; padding: 15px 30px;
            border-radius: var(--radius); margin-bottom: 30px; font-weight: bold; font-size: 1.2rem;
            box-shadow: 0 5px 15px rgba(93, 203, 195, 0.3);
        }

        /* GAME CARD */
        .game-card {
            background: white; padding: 40px; border-radius: var(--radius);
            box-shadow: var(--shadow); border-top: 6px solid var(--accent-coral);
            text-align: center;
        }

        /* MEDIA GRID (Map + Flag) */
        .media-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .media-grid { grid-template-columns: 1fr; }
        }

        .map-box, .flag-box {
            background: var(--bg-light); border-radius: 15px; overflow: hidden;
            border: 2px solid #eee; height: 250px; display: flex; align-items: center; justify-content: center;
        }
        
        .map-box iframe { width: 100%; height: 100%; border: none; pointer-events: none; }
        .flag-box img { max-width: 90%; max-height: 90%; object-fit: contain; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        /* INPUTS & HINTS */
        .input-group { margin-bottom: 25px; text-align: left; }
        .input-group label { display: block; font-weight: 700; color: var(--text-dark); margin-bottom: 8px; font-size: 1.1rem; }
        
        .hint-text {
            font-family: monospace; font-size: 1.5rem; letter-spacing: 5px; color: var(--primary-dark);
            margin-bottom: 10px; display: block; background: #f0f8f8; padding: 10px; border-radius: 8px; text-align: center;
        }

        .custom-input {
            width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 12px;
            font-family: 'Poppins', sans-serif; font-size: 1.1rem; box-sizing: border-box; transition: 0.3s;
        }
        .custom-input:focus { border-color: var(--primary-teal); outline: none; box-shadow: 0 0 0 3px rgba(93,203,195,0.2); }
        .custom-input.correct { border-color: #10b981; background: #d1fae5; color: #065f46; font-weight: bold; }
        .custom-input.wrong { border-color: #ef4444; background: #fee2e2; color: #991b1b; }

        /* BUTTONS */
        .btn-container { display: flex; gap: 15px; justify-content: center; margin-top: 30px; }
        
        .btn-main {
            background: var(--accent-coral); color: white; border: none; padding: 15px 40px;
            border-radius: 50px; font-size: 1.1rem; font-weight: bold; cursor: pointer;
            transition: 0.3s; font-family: 'Poppins', sans-serif;
            box-shadow: 0 5px 15px rgba(255,154,139,0.3);
        }
        .btn-main:hover { background: #ff7e6b; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255,154,139,0.4); }
        .btn-main:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }

        .btn-secondary {
            background: var(--primary-teal); color: white; border: none; padding: 15px 40px;
            border-radius: 50px; font-size: 1.1rem; font-weight: bold; cursor: pointer;
            transition: 0.3s; font-family: 'Poppins', sans-serif; display: none;
        }
        .btn-secondary:hover { background: var(--primary-dark); transform: translateY(-2px); }

        .feedback-msg { font-size: 1.2rem; font-weight: bold; margin-top: 20px; min-height: 30px; }
        .text-success { color: #10b981; }
        .text-danger { color: #ef4444; }

    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-link">← Return to HUB</a>
        <h1><span class="material-icons-round">public</span> World Explorer Guesser</h1>
        <div class="subtitle">Look at the map and flag, check the hints, and guess!</div>
    </header>

    <div class="container">
        
        <div class="score-board">
            <div>Country: <span id="current-round">1</span>/50</div>
            <div>Score: <span id="score-display">0</span> pts</div>
        </div>

        <div class="game-card">
            
            <div class="media-grid">
                <div class="map-box" id="map-container">
                    </div>
                <div class="flag-box">
                    <img id="flag-img" src="" alt="Country Flag">
                </div>
            </div>

            <div class="input-group">
                <label>1. Name the Country</label>
                <div class="hint-text" id="country-hint">_ _ _ _ _</div>
                <input type="text" id="input-country" class="custom-input" placeholder="Type the country name..." autocomplete="off">
            </div>

            <div class="input-group">
                <label>2. Name the Nationality</label>
                <div class="hint-text" id="nationality-hint">_ _ _ _ _ _ _</div>
                <input type="text" id="input-nationality" class="custom-input" placeholder="Type the nationality..." autocomplete="off">
            </div>

            <div class="feedback-msg" id="feedback-message"></div>

            <div class="btn-container">
                <button class="btn-main" id="btn-check" onclick="checkAnswer()">Check Answer</button>
                <button class="btn-secondary" id="btn-next" onclick="nextCountry()">Next Country ➔</button>
            </div>

        </div>
    </div>

    <script>
        // Database of 50 Countries (Code for Flag API, Country, Nationality)
        const countriesData = [
            { code: "bo", country: "Bolivia", nat: "Bolivian" },
            { code: "ar", country: "Argentina", nat: "Argentinian" },
            { code: "br", country: "Brazil", nat: "Brazilian" },
            { code: "co", country: "Colombia", nat: "Colombian" },
            { code: "cl", country: "Chile", nat: "Chilean" },
            { code: "pe", country: "Peru", nat: "Peruvian" },
            { code: "mx", country: "Mexico", nat: "Mexican" },
            { code: "us", country: "United States", nat: "American" },
            { code: "ca", country: "Canada", nat: "Canadian" },
            { code: "gb", country: "United Kingdom", nat: "British" },
            { code: "ie", country: "Ireland", nat: "Irish" },
            { code: "au", country: "Australia", nat: "Australian" },
            { code: "nz", country: "New Zealand", nat: "New Zealander" },
            { code: "fr", country: "France", nat: "French" },
            { code: "de", country: "Germany", nat: "German" },
            { code: "it", country: "Italy", nat: "Italian" },
            { code: "es", country: "Spain", nat: "Spanish" },
            { code: "pt", country: "Portugal", nat: "Portuguese" },
            { code: "gr", country: "Greece", nat: "Greek" },
            { code: "ru", country: "Russia", nat: "Russian" },
            { code: "cn", country: "China", nat: "Chinese" },
            { code: "jp", country: "Japan", nat: "Japanese" },
            { code: "kr", country: "South Korea", nat: "South Korean" },
            { code: "in", country: "India", nat: "Indian" },
            { code: "eg", country: "Egypt", nat: "Egyptian" },
            { code: "za", country: "South Africa", nat: "South African" },
            { code: "ng", country: "Nigeria", nat: "Nigerian" },
            { code: "ke", country: "Kenya", nat: "Kenyan" },
            { code: "ma", country: "Morocco", nat: "Moroccan" },
            { code: "tr", country: "Turkey", nat: "Turkish" },
            { code: "sa", country: "Saudi Arabia", nat: "Saudi Arabian" },
            { code: "th", country: "Thailand", nat: "Thai" },
            { code: "vn", country: "Vietnam", nat: "Vietnamese" },
            { code: "ph", country: "Philippines", nat: "Filipino" },
            { code: "se", country: "Sweden", nat: "Swedish" },
            { code: "no", country: "Norway", nat: "Norwegian" },
            { code: "dk", country: "Denmark", nat: "Danish" },
            { code: "fi", country: "Finland", nat: "Finnish" },
            { code: "ch", country: "Switzerland", nat: "Swiss" },
            { code: "at", country: "Austria", nat: "Austrian" },
            { code: "be", country: "Belgium", nat: "Belgian" },
            { code: "nl", country: "Netherlands", nat: "Dutch" },
            { code: "pl", country: "Poland", nat: "Polish" },
            { code: "ua", country: "Ukraine", nat: "Ukrainian" },
            { code: "cu", country: "Cuba", nat: "Cuban" },
            { code: "jm", country: "Jamaica", nat: "Jamaican" },
            { code: "ve", country: "Venezuela", nat: "Venezuelan" },
            { code: "ec", country: "Ecuador", nat: "Ecuadorian" },
            { code: "uy", country: "Uruguay", nat: "Uruguayan" },
            { code: "mg", country: "Madagascar", nat: "Malagasy" }
        ];

        let currentList = [];
        let currentIndex = 0;
        let score = 0;

        // Shuffle the array to make it dynamic every time
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // Generate hints by replacing characters with underscores
        function generateHint(word) {
            let result = "";
            let chars = word.split('');
            for (let i = 0; i < chars.length; i++) {
                if (chars[i] === " ") {
                    result += "  "; // double space for multiple words
                } else if (i === 0 || i === chars.length - 1 || Math.random() > 0.6) {
                    result += chars[i] + " "; // Reveal first, last, and random letters
                } else {
                    result += "_ ";
                }
            }
            return result.trim();
        }

        function initGame() {
            // Copy and shuffle the data (ensure Bolivia plays often if you want, but random is fun!)
            currentList = shuffle([...countriesData]);
            currentIndex = 0;
            score = 0;
            document.getElementById("score-display").innerText = score;
            loadCountry();
        }

        function loadCountry() {
            if (currentIndex >= currentList.length) {
                document.getElementById("feedback-message").innerHTML = `<span class="text-success">🎉 Amazing! You completed the World Explorer! Final Score: ${score}</span>`;
                return;
            }

            const data = currentList[currentIndex];
            
            // Update UI Counters
            document.getElementById("current-round").innerText = currentIndex + 1;

            // Load Map (Google Maps Embed API - dynamic search)
            const mapHtml = `<iframe src="https://maps.google.com/maps?q=${encodeURIComponent(data.country)}&t=&z=4&ie=UTF8&iwloc=&output=embed"></iframe>`;
            document.getElementById("map-container").innerHTML = mapHtml;

            // Load Flag (FlagCDN API)
            document.getElementById("flag-img").src = `https://flagcdn.com/w320/${data.code}.png`;

            // Load Hints
            document.getElementById("country-hint").innerText = generateHint(data.country);
            document.getElementById("nationality-hint").innerText = generateHint(data.nat);

            // Reset Inputs and Buttons
            const inputC = document.getElementById("input-country");
            const inputN = document.getElementById("input-nationality");
            inputC.value = ""; inputN.value = "";
            inputC.className = "custom-input"; inputN.className = "custom-input";
            inputC.disabled = false; inputN.disabled = false;
            
            document.getElementById("feedback-message").innerHTML = "";
            document.getElementById("btn-check").style.display = "block";
            document.getElementById("btn-next").style.display = "none";
            
            // Focus first input
            inputC.focus();
        }

        function checkAnswer() {
            const data = currentList[currentIndex];
            const inputC = document.getElementById("input-country");
            const inputN = document.getElementById("input-nationality");
            
            const ansC = inputC.value.trim().toLowerCase();
            const ansN = inputN.value.trim().toLowerCase();
            const correctC = data.country.toLowerCase();
            const correctN = data.nat.toLowerCase();

            let pointsEarned = 0;

            // Check Country
            if (ansC === correctC) {
                inputC.classList.add("correct");
                pointsEarned += 10;
            } else {
                inputC.classList.add("wrong");
                inputC.value = data.country; // Show correct answer
            }

            // Check Nationality
            if (ansN === correctN) {
                inputN.classList.add("correct");
                pointsEarned += 10;
            } else {
                inputN.classList.add("wrong");
                inputN.value = data.nat; // Show correct answer
            }

            // Update Score
            score += pointsEarned;
            document.getElementById("score-display").innerText = score;

            // Feedback
            const feedback = document.getElementById("feedback-message");
            if (pointsEarned === 20) {
                feedback.innerHTML = `<span class="text-success">Perfect! +20 points</span>`;
            } else if (pointsEarned === 10) {
                feedback.innerHTML = `<span class="text-danger">Almost! You missed one. Correct answers revealed.</span>`;
            } else {
                feedback.innerHTML = `<span class="text-danger">Oops! Correct answers are shown above.</span>`;
            }

            // Swap Buttons
            inputC.disabled = true;
            inputN.disabled = true;
            document.getElementById("btn-check").style.display = "none";
            document.getElementById("btn-next").style.display = "block";
        }

        function nextCountry() {
            currentIndex++;
            loadCountry();
        }

        // Allow pressing "Enter" to submit
        document.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                const btnCheck = document.getElementById("btn-check");
                const btnNext = document.getElementById("btn-next");
                if (btnCheck.style.display !== "none") {
                    btnCheck.click();
                } else if (btnNext.style.display !== "none") {
                    btnNext.click();
                }
            }
        });

        // Start Game on load
        window.onload = initGame;
    </script>
</body>
</html>
