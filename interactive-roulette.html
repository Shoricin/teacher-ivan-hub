<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interactive English Roulette | Teacher Ivan HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul-primario: #0A468C; 
            --naranja-vibrante: #F56E1E; 
            --blanco-nieve: #FAFAF0; 
            --blanco-puro: #FFFFFF;
            --verde-exito: #28a745;
            --font-titulares: 'Montserrat', sans-serif; 
            --font-cuerpo: 'Open Sans', sans-serif; 
        }

        body {
            margin: 0; padding: 0;
            font-family: var(--font-cuerpo);
            background-color: var(--blanco-nieve);
            color: #333;
            display: flex; flex-direction: column;
            min-height: 100vh; overflow-x: hidden;
        }

        /* --- Header --- */
        header {
            background-image: linear-gradient(rgba(10, 70, 140, 0.95), rgba(10, 70, 140, 1)), url('https://i.imgur.com/AIOtoMn.jpeg');
            background-size: cover; background-position: center;
            color: var(--blanco-puro);
            text-align: center; padding: 1.5rem 1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: sticky; top: 0; z-index: 100;
            display: flex; flex-direction: column; align-items: center;
        }

        .logo-img { height: 60px; width: auto; margin-bottom: 10px; }
        header h1 { font-family: var(--font-titulares); margin: 0; font-size: 1.6rem; text-transform: uppercase; letter-spacing: 1px;}
        header h1 span { color: var(--naranja-vibrante); }

        /* --- Layout Principal --- */
        .main-container {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; padding: 2rem 1rem;
            max-width: 1000px; margin: 0 auto; width: 100%;
            box-sizing: border-box;
        }

        .intro-text {
            text-align: center; margin-bottom: 2rem; font-size: 1.1rem; color: #555;
        }

        /* --- Ruleta y Controles --- */
        .roulette-wrapper {
            position: relative;
            display: flex; flex-direction: column; align-items: center;
        }

        .canvas-container {
            position: relative;
            width: 350px; height: 350px;
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 8px solid var(--blanco-puro);
            background-color: var(--blanco-puro);
        }

        canvas { width: 100%; height: 100%; border-radius: 50%; }

        .pointer {
            position: absolute;
            top: -20px; left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid var(--naranja-vibrante);
            z-index: 10;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.3));
        }

        .spin-btn {
            background-color: var(--naranja-vibrante); color: var(--blanco-puro);
            border: none; padding: 15px 50px; font-size: 1.5rem;
            font-family: var(--font-titulares); font-weight: bold;
            border-radius: 50px; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 8px 20px rgba(245, 110, 30, 0.4);
            margin-top: 2rem; transition: 0.2s; letter-spacing: 2px;
        }

        .spin-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(245, 110, 30, 0.5); }
        .spin-btn:active { transform: scale(0.95); }
        .spin-btn:disabled { background-color: #ccc; cursor: not-allowed; box-shadow: none; transform: none; }

        /* --- Modal de Reto --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 1000;
            display: none; justify-content: center; align-items: center;
            padding: 20px; box-sizing: border-box;
        }

        .challenge-card {
            background: var(--blanco-puro); width: 100%; max-width: 450px;
            border-radius: 20px; overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center; border: 5px solid var(--azul-primario);
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.7); }
            100% { opacity: 1; transform: scale(1); }
        }

        .card-header {
            background: var(--azul-primario); color: white;
            padding: 20px; font-family: var(--font-titulares);
        }
        
        .number-badge {
            background: var(--naranja-vibrante); color: white;
            font-size: 2rem; font-weight: bold; padding: 10px 20px;
            border-radius: 50px; display: inline-block; margin-bottom: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .card-body { padding: 30px; }
        
        .challenge-text {
            font-size: 1.4rem; line-height: 1.6; font-weight: 700;
            color: #333; margin-bottom: 25px; font-family: var(--font-titulares);
        }

        .action-btn {
            background-color: var(--verde-exito); color: white; border: none;
            padding: 15px 30px; font-size: 1.1rem; font-family: var(--font-titulares);
            font-weight: bold; border-radius: 50px; cursor: pointer; width: 100%;
            transition: 0.2s; text-transform: uppercase;
        }
        .action-btn:hover { background-color: #218838; }

        /* Media Queries para Pantallas más grandes */
        @media (min-width: 768px) {
            .canvas-container { width: 500px; height: 500px; }
        }
    </style>
</head>
<body>

    <header>
        <img src="https://i.imgur.com/s05NqFM.png" alt="Teacher Ivan Logo" class="logo-img">
        <h1>Interactive <span>Roulette</span></h1>
    </header>

    <div class="main-container">
        <div class="intro-text">
            <strong>Spin the wheel!</strong> Completa el reto en inglés de la casilla que te toque. ¡Buena suerte!
        </div>

        <div class="roulette-wrapper">
            <div class="pointer"></div>
            <div class="canvas-container">
                <canvas id="wheelCanvas" width="500" height="500"></canvas>
            </div>
            <button class="spin-btn" id="spinBtn" onclick="spinWheel()">SPIN!</button>
        </div>
    </div>

    <!-- Modal del Reto -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="challenge-card">
            <div class="card-header">
                <div class="number-badge" id="displayNumber">#1</div>
                <h2 style="margin: 0; font-size: 1.2rem; letter-spacing: 1px;">CHALLENGE TIME</h2>
            </div>
            <div class="card-body">
                <div class="challenge-text" id="challengeText">Here goes the challenge!</div>
                <button class="action-btn" onclick="closeModal()">Challenge Completed!</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // BASE DE DATOS DE 50 RETOS EN INGLÉS
        // ==========================================
        const challenges = [
            "Introduce yourself in English (Name, Age, City).",
            "Name 5 colors in English in 10 seconds.",
            "Spell your full name in English.",
            "Sing the chorus of your favorite English song!",
            "Tongue Twister: 'She sells seashells by the seashore.'",
            "Name 5 wild animals in English.",
            "Say the days of the week backwards!",
            "Write on the board a sentence dictated by the teacher.",
            "Name 3 things you can find in a kitchen.",
            "Tell us your favorite food and explain why you like it.",
            "Name 5 irregular verbs in the past tense.",
            "Pretend you are a waiter and take an order.",
            "Count from 20 to 1 backwards.",
            "Tongue Twister: 'I scream, you scream, we all scream for ice cream.'",
            "Name 4 different professions in English.",
            "Describe exactly what you are wearing right now.",
            "Ask the teacher a polite question using 'Could I...'.",
            "Name 3 objects in the classroom that are blue.",
            "Say a sentence using the adverb 'ALWAYS'.",
            "Spell the word 'ENVIRONMENT'.",
            "Read a short paragraph provided by the teacher.",
            "Name 4 members of the extended family.",
            "What did you do yesterday? (Use Past Simple).",
            "Name 5 fruits in English.",
            "Tongue Twister: 'Peter Piper picked a peck of pickled peppers.'",
            "Say 3 things you like to do in your free time.",
            "Name 3 types of weather conditions.",
            "Describe your bedroom using prepositions (in, on, under).",
            "Say a sentence using the Second Conditional (If I had...).",
            "Spell the word 'BEAUTIFUL'.",
            "Name 3 forms of public transportation.",
            "Pretend you are at the airport and order a flight ticket.",
            "Say the 12 months of the year in English.",
            "What are you going to do tomorrow? (Use 'going to').",
            "Name 5 parts of the human body.",
            "Give directions to the nearest hospital from here.",
            "Tongue Twister: 'How much wood would a woodchuck chuck...'",
            "Name 3 things you NEVER do.",
            "Ask a classmate a question about their daily routine.",
            "Spell the word 'KNOWLEDGE'.",
            "Make a polite request using 'May I...'.",
            "Name 4 articles of winter clothing.",
            "Describe your favorite movie in just 2 sentences.",
            "Say a sentence using a contrast connector (However/Although).",
            "Pretend you have a headache and talk to a doctor.",
            "Name 3 sports that require a ball.",
            "Say 3 adjectives to describe a dog.",
            "Spell the word 'COMFORTABLE'.",
            "Tell the class about a place you want to travel to.",
            "Teacher's Choice! The teacher gives you a secret challenge."
        ];

        // ==========================================
        // MOTOR DE LA RULETA (CANVAS)
        // ==========================================
        const canvas = document.getElementById("wheelCanvas");
        const ctx = canvas.getContext("2d");
        const spinBtn = document.getElementById("spinBtn");
        
        const numSlices = 50;
        const sliceAngle = (2 * Math.PI) / numSlices;
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const radius = centerX;

        // Colores de la marca (Alternados)
        const colors = ["#0A468C", "#F56E1E"];

        let currentAngle = 0;
        let spinVelocity = 0;
        let isSpinning = false;
        let animationFrame;

        // Función para dibujar la ruleta
        function drawWheel() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < numSlices; i++) {
                const startAngle = currentAngle + i * sliceAngle;
                const endAngle = startAngle + sliceAngle;

                // Dibujar la porción (slice)
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = colors[i % 2];
                ctx.fill();
                ctx.lineWidth = 1;
                ctx.strokeStyle = "#FFFFFF";
                ctx.stroke();

                // Dibujar el texto (Número)
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(startAngle + sliceAngle / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#FFFFFF";
                ctx.font = "bold 14px 'Montserrat', sans-serif";
                
                // Ajustar posición del texto cerca del borde exterior
                ctx.fillText((i + 1).toString(), radius - 15, 5);
                ctx.restore();
            }
            
            // Círculo central decorativo
            ctx.beginPath();
            ctx.arc(centerX, centerY, 30, 0, 2 * Math.PI);
            ctx.fillStyle = "#FFFFFF";
            ctx.fill();
            ctx.lineWidth = 4;
            ctx.strokeStyle = "#0A468C";
            ctx.stroke();
        }

        // Lógica de Giro
        function spinWheel() {
            if (isSpinning) return;
            isSpinning = true;
            spinBtn.disabled = true;
            spinBtn.textContent = "SPINNING...";

            // Velocidad inicial aleatoria para resultados distintos
            spinVelocity = Math.random() * 0.2 + 0.4; 
            animateSpin();
        }

        function animateSpin() {
            currentAngle += spinVelocity;
            
            // Fricción para frenar gradualmente
            spinVelocity *= 0.992; 

            drawWheel();

            if (spinVelocity > 0.002) {
                animationFrame = requestAnimationFrame(animateSpin);
            } else {
                // El giro ha terminado
                isSpinning = false;
                spinBtn.disabled = false;
                spinBtn.textContent = "SPIN!";
                determineWinner();
            }
        }

        function determineWinner() {
            // El puntero está fijo en la parte superior (270 grados o 1.5 * PI)
            // Calculamos qué ángulo quedó en esa posición
            const normalizedAngle = currentAngle % (2 * Math.PI);
            const pointerAngle = (1.5 * Math.PI); 
            
            let relativeAngle = pointerAngle - normalizedAngle;
            if (relativeAngle < 0) {
                relativeAngle += 2 * Math.PI;
            }

            // Encontrar el índice del slice
            const winningIndex = Math.floor(relativeAngle / sliceAngle);
            const winningNumber = winningIndex + 1;

            showChallenge(winningNumber);
        }

        // ==========================================
        // UI DEL MODAL
        // ==========================================
        function showChallenge(number) {
            const modal = document.getElementById("modalOverlay");
            const numberBadge = document.getElementById("displayNumber");
            const textDisplay = document.getElementById("challengeText");

            numberBadge.textContent = "#" + number;
            // El índice en el array es number - 1
            textDisplay.textContent = challenges[number - 1];

            modal.style.display = "flex";
        }

        function closeModal() {
            document.getElementById("modalOverlay").style.display = "none";
        }

        // Dibujar la ruleta al cargar la página
        drawWheel();

    </script>
</body>
</html>
