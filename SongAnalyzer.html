<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Analyzer | Teacher Ivan</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root {
            --azul-primario: #0A468C; 
            --naranja-vibrante: #F56E1E; 
            --blanco-nieve: #FAFAF0; 
            --gris-claro: #f0f4f8;
            --verde-correcto: #4CAF50;
            --rojo-error: #F44336;
            --texto-oscuro: #333333;
            --shadow: 0 10px 30px rgba(10, 70, 140, 0.1);
            --radius: 12px;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: var(--blanco-nieve);
            color: var(--texto-oscuro);
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            min-height: 100vh;
        }

        h1, h2, h3 { font-family: 'Montserrat', sans-serif; color: var(--azul-primario); margin: 0; }

        /* HEADER */
        header {
            background: white;
            padding: 2rem;
            text-align: center;
            border-bottom: 8px solid var(--azul-primario);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: relative;
        }
        
        .back-link { position: absolute; top: 20px; left: 20px; text-decoration: none; color: #666; font-weight: 600; transition: 0.2s;}
        .back-link:hover { color: var(--naranja-vibrante); }
        
        header img { height: 60px; margin-bottom: 10px; }
        header h1 { font-size: 2.2rem; display: flex; align-items: center; justify-content: center; gap: 10px; text-transform: uppercase;}
        .subtitle { color: #666; margin-top: 5px; font-weight: 600; font-size: 1.1rem;}

        /* MAIN CONTAINER */
        .container { max-width: 1200px; margin: 30px auto 50px; width: 95%; }

        /* SONG SELECTOR */
        .song-selector {
            display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 20px;
            scrollbar-width: thin; scrollbar-color: var(--naranja-vibrante) #eee;
        }
        .song-selector::-webkit-scrollbar { height: 8px; }
        .song-selector::-webkit-scrollbar-thumb { background-color: var(--naranja-vibrante); border-radius: 10px; }
        
        .song-btn {
            background: white; border: 2px solid #ddd; padding: 10px 20px; border-radius: 50px;
            font-family: 'Montserrat', sans-serif; font-weight: 700; color: #666; cursor: pointer;
            white-space: nowrap; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.02); display: flex; align-items: center; gap: 8px;
        }
        .song-btn:hover { border-color: var(--azul-primario); color: var(--azul-primario); }
        .song-btn.active {
            background: var(--naranja-vibrante); color: white; transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(245, 110, 30, 0.3); border-color: var(--naranja-vibrante);
        }

        /* TWO COLUMN LAYOUT */
        .analyzer-layout {
            display: grid; grid-template-columns: 1fr 1.2fr; gap: 30px; align-items: start;
        }

        @media (max-width: 900px) {
            .analyzer-layout { grid-template-columns: 1fr; }
            .video-section { position: static !important; }
        }

        /* VIDEO SECTION (STICKY) */
        .video-section {
            background: white; padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow);
            border-top: 5px solid var(--naranja-vibrante); position: sticky; top: 20px;
        }
        .video-wrapper {
            position: relative; padding-bottom: 56.25%; height: 0; border-radius: 8px; overflow: hidden; background: #000;
        }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .song-info { margin-top: 20px; text-align: center; }
        .song-title { font-size: 1.5rem; color: var(--azul-primario); }
        .song-artist { font-size: 1.1rem; color: #555; margin: 5px 0 0 0; font-weight: 600;}

        /* LYRICS SECTION */
        .lyrics-section {
            background: white; padding: 40px; border-radius: var(--radius); box-shadow: var(--shadow);
            border-top: 5px solid var(--azul-primario);
        }
        .instructions {
            background: var(--gris-claro); padding: 15px 20px; border-left: 5px solid var(--naranja-vibrante);
            border-radius: 0 8px 8px 0; font-size: 1rem; color: #444; margin-bottom: 30px; font-style: italic;
        }

        .lyrics-content {
            font-family: 'Open Sans', sans-serif; font-size: 1.25rem; line-height: 2.8; color: #333; font-weight: 600;
        }

        .gap-input {
            width: 140px; padding: 6px 12px; border: 2px solid #ccc; border-radius: 6px;
            font-family: 'Open Sans', sans-serif; font-weight: 700; text-align: center;
            outline: none; transition: 0.3s; font-size: 1.1rem; margin: 0 5px; background: white; color: var(--azul-primario);
        }
        .gap-input:focus { border-color: var(--naranja-vibrante); box-shadow: 0 0 5px rgba(245, 110, 30, 0.3);}
        
        .gap-input.correct { border-color: var(--verde-correcto); background: #e8f5e9; color: #2e7d32; pointer-events: none;}
        .gap-input.wrong { border-color: var(--rojo-error); background: #ffebee; color: #c62828; }
        
        .correction-text { font-size: 0.85rem; color: var(--rojo-error); font-weight: bold; display: inline-block; position: absolute; transform: translateY(22px); margin-left: -145px;}

        /* BUTTONS & FEEDBACK */
        .btn-check {
            background: var(--naranja-vibrante); color: white; border: none; padding: 15px 40px; border-radius: 8px;
            font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.3s; width: 100%; font-family: 'Montserrat', sans-serif; margin-top: 35px;
            display: flex; justify-content: center; align-items: center; gap: 10px; text-transform: uppercase;
        }
        .btn-check:hover { background: #d85c14; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(245, 110, 30, 0.3);}

        .feedback-box {
            margin-top: 20px; padding: 15px; border-radius: 8px; font-weight: bold; text-align: center; display: none; font-size: 1.1rem;
        }
        .success { background: #e8f5e9; color: var(--verde-correcto); }
        .danger { background: #fff3e0; color: #ff9800; }

    </style>
</head>
<body>

    <header>
        <a href="#" class="back-link">← Volver al HUB</a>
        <img src="https://i.imgur.com/s05NqFM.png" alt="Teacher Ivan Logo">
        <h1><span class="material-icons-round">queue_music</span> Song Analyzer</h1>
        <div class="subtitle">Spanish Listening Practice</div>
    </header>

    <div class="container">
        
        <div class="song-selector" id="song-tabs">
            <!-- Tabs generados dinámicamente -->
        </div>

        <div class="analyzer-layout">
            
            <!-- VIDEO SECTION -->
            <div class="video-section">
                <div class="video-wrapper">
                    <iframe id="yt-player" src="" allowfullscreen></iframe>
                </div>
                <div class="song-info">
                    <h2 class="song-title" id="display-title">Cargando...</h2>
                    <p class="song-artist" id="display-artist">Cargando...</p>
                </div>
            </div>

            <!-- LYRICS SECTION -->
            <div class="lyrics-section">
                <div class="instructions">
                    <span class="material-icons-round" style="vertical-align: middle;">headphones</span> <strong>Instrucciones:</strong> Reproduce el video y escucha con atención. Escribe las palabras faltantes en los espacios. ¡Cuidado con la ortografía!
                </div>
                
                <div class="lyrics-content" id="lyrics-container">
                    <!-- Letras generadas dinámicamente -->
                </div>

                <button class="btn-check" id="check-btn" onclick="checkAnswers()">Revisar Respuestas <span class="material-icons-round">spellcheck</span></button>
                <div id="feedback-display" class="feedback-box"></div>
            </div>

        </div>

    </div>

    <script>
        // BASE DE DATOS DE CANCIONES EN ESPAÑOL
        // Formato: Usa [palabra] para crear un espacio en blanco.
        const songDatabase = [
            {
                title: "Vivir Mi Vida",
                artist: "Marc Anthony",
                youtubeId: "YXnjy5YlDwk", 
                lyrics: `Voy a reír, voy a [bailar]<br>
                        Vivir mi [vida] la la la la<br>
                        Voy a reír, voy a [gozar]<br>
                        Vivir mi vida la la la la<br><br>
                        A veces llega la [lluvia]<br>
                        Para limpiar las [heridas]<br>
                        A veces solo una [gota]<br>
                        Puede vencer la [sequía]<br><br>
                        Y para qué llorar, pa' qué<br>
                        Si duele una [pena], se olvida<br>
                        Y para qué sufrir, pa' qué<br>
                        Si así es la [vida], hay que vivirla`
            },
            {
                title: "Despacito",
                artist: "Luis Fonsi ft. Daddy Yankee",
                youtubeId: "kJQP7kiw5Fk",
                lyrics: `Sí, sabes que ya llevo un rato [mirándote]<br>
                        Tengo que bailar [contigo] hoy<br>
                        Vi que tu [mirada] ya estaba llamándome<br>
                        Muéstrame el [camino] que yo voy<br><br>
                        Tú, tú eres el imán y yo soy el [metal]<br>
                        Me voy acercando y voy armando el [plan]<br>
                        Solo con pensarlo se acelera el [pulso]<br><br>
                        Ya, ya me está gustando más de lo [normal]<br>
                        Todos mis sentidos van pidiendo [más]<br>
                        Esto hay que tomarlo sin ningún [apuro]`
            },
            {
                title: "Limón y Sal",
                artist: "Julieta Venegas",
                youtubeId: "tIpzfs5tBJU",
                lyrics: `Tengo que [confesar] que a veces<br>
                        No me gusta tu forma de [ser]<br>
                        Luego te me [desapareces]<br>
                        Y no entiendo muy bien por [qué]<br><br>
                        No dices nada [romántico]<br>
                        Cuando llega el [atardecer]<br>
                        Te pones de un humor [extraño]<br>
                        Con cada luna llena al [mes]<br><br>
                        Pero a todo lo malo, le veo lo [bueno]<br>
                        Me haces [sentir] como nadie más`
            },
            {
                title: "La Camisa Negra",
                artist: "Juanes",
                youtubeId: "kRt2sRyup6A",
                lyrics: `Tengo la [camisa] negra<br>
                        Hoy mi [amor] está de luto<br>
                        Hoy tengo en el alma una [pena]<br>
                        Y es por culpa de tu embrujo<br><br>
                        Hoy sé que tú ya no me [quieres]<br>
                        Y eso es lo que más me [hiere]<br>
                        Que tengo la camisa negra<br>
                        Y una pena que me [duele]<br><br>
                        Mal parece que solo me quedé<br>
                        Y fue pura [mentira] lo tuyo`
            },
            {
                title: "Me Gustas Tú",
                artist: "Manu Chao",
                youtubeId: "rs6Y4kZ8qtw",
                lyrics: `Me gustan los aviones, me gustas [tú]<br>
                        Me gusta viajar, me gustas [tú]<br>
                        Me gusta la [mañana], me gustas tú<br>
                        Me gusta el [viento], me gustas tú<br><br>
                        Me gusta [soñar], me gustas tú<br>
                        Me gusta la mar, me gustas tú<br>
                        Me gusta la [moto], me gustas tú<br>
                        Me gusta correr, me gustas [tú]<br><br>
                        ¿Qué voy a [hacer]?, je ne sais pas<br>
                        ¿Qué voy a hacer?, je ne sais [plus]`
            }
        ];

        let currentSongIndex = 0;

        // Inicializar la aplicación
        function initApp() {
            const tabsContainer = document.getElementById('song-tabs');
            
            // Generar los botones (Tabs)
            songDatabase.forEach((song, index) => {
                const btn = document.createElement('button');
                btn.className = `song-btn ${index === 0 ? 'active' : ''}`;
                btn.innerHTML = `<span class="material-icons-round" style="font-size: 1.2rem;">music_note</span> ${song.title}`;
                btn.onclick = (e) => loadSong(index, e.currentTarget);
                tabsContainer.appendChild(btn);
            });

            // Cargar la primera canción
            loadSong(0, tabsContainer.firstChild);
        }

        // Cargar canción específica
        function loadSong(index, btnElement) {
            currentSongIndex = index;
            const song = songDatabase[index];

            // Actualizar interfaz de las pestañas
            document.querySelectorAll('.song-btn').forEach(btn => btn.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');

            // Actualizar Video e Info
            document.getElementById('yt-player').src = `https://www.youtube.com/embed/${song.youtubeId}?rel=0`;
            document.getElementById('display-title').innerText = song.title;
            document.getElementById('display-artist').innerText = song.artist;

            // Procesar las letras (Convertir [palabra] en inputs de HTML)
            const parsedLyrics = song.lyrics.replace(/\[(.*?)\]/g, (match, p1) => {
                // Genera un input escondiendo la respuesta en "data-ans"
                return `<input type="text" class="gap-input" data-ans="${p1.toLowerCase()}">`;
            });

            document.getElementById('lyrics-container').innerHTML = parsedLyrics;
            
            // Resetear retroalimentación y botón
            document.getElementById('feedback-display').style.display = "none";
            document.getElementById('check-btn').style.display = "flex";
        }

        // Revisar Respuestas
        function checkAnswers() {
            const inputs = document.querySelectorAll('.gap-input');
            let score = 0;
            let total = inputs.length;
            let allFilled = true;

            // Limpiar textos de corrección previos
            document.querySelectorAll('.correction-text').forEach(el => el.remove());

            inputs.forEach(input => {
                if(input.value.trim() === "") allFilled = false;
            });

            if (!allFilled) {
                alert("¡Por favor llena todos los espacios antes de revisar!");
                return;
            }

            inputs.forEach(input => {
                const correctAnswer = input.getAttribute('data-ans');
                // Ignorar mayúsculas y acentos extraños al comparar (opcional, pero ayuda)
                const studentAnswer = input.value.trim().toLowerCase();

                input.classList.remove('correct', 'wrong');

                if (studentAnswer === correctAnswer) {
                    input.classList.add('correct');
                    score++;
                } else {
                    input.classList.add('wrong');
                    // Mostrar la respuesta correcta debajo en rojo
                    const span = document.createElement('span');
                    span.className = 'correction-text';
                    span.innerText = correctAnswer;
                    input.parentNode.insertBefore(span, input.nextSibling);
                }
            });

            // Mostrar Mensaje Final
            const feedback = document.getElementById('feedback-display');
            feedback.style.display = 'block';
            feedback.className = 'feedback-box';

            if (score === total) {
                feedback.classList.add('success');
                feedback.innerHTML = `🎉 ¡Puntaje Perfecto! Obtuviste ${score}/${total} palabras correctas. ¡Excelente oído!`;
                document.getElementById('check-btn').style.display = "none";
            } else {
                feedback.classList.add('danger');
                feedback.innerHTML = `⚠️ Obtuviste ${score} de ${total}. ¡Revisa las palabras en rojo y vuelve a escuchar!`;
            }
        }

        // Iniciar aplicación cuando cargue la ventana
        window.onload = initApp;

    </script>
</body>
</html>
