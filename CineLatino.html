<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cine Latino Hub | Teacher Ivan</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #141414;
            --bg-panel: #1f1f1f;
            --primary-red: #e50914;
            --text-main: #ffffff;
            --text-muted: #b3b3b3;
            --success: #22c55e;
            --error: #ef4444;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR (TABS) */
        .sidebar {
            width: 280px;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #333;
            overflow-y: auto;
        }

        .brand {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 1.5rem;
            color: var(--primary-red);
            padding: 25px 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #333;
        }

        .tab-btn {
            background: transparent;
            color: var(--text-muted);
            border: none;
            padding: 18px 20px;
            text-align: left;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            border-left: 4px solid transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tab-btn:hover {
            background: rgba(255,255,255,0.05);
            color: var(--text-main);
        }

        .tab-btn.active {
            background: var(--bg-panel);
            color: var(--text-main);
            border-left-color: var(--primary-red);
        }

        /* MAIN CONTENT */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            scroll-behavior: smooth;
        }

        .content-container {
            max-width: 900px;
            margin: 0 auto;
            animation: fadeIn 0.4s ease;
        }

        .scene-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0 0 10px 0;
        }

        .context-box {
            background: rgba(229, 9, 20, 0.1);
            border-left: 4px solid var(--primary-red);
            padding: 15px 20px;
            margin-bottom: 30px;
            font-size: 1.05rem;
            line-height: 1.6;
            color: #e5e5e5;
            border-radius: 0 8px 8px 0;
        }

        /* VIDEO */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: #000;
        }
        .video-wrapper iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;
        }

        /* VOCABULARY */
        .section-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .vocab-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 50px;
        }

        .vocab-card {
            background: var(--bg-panel);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid #333;
            transition: 0.3s;
        }

        .vocab-card:hover { border-color: var(--primary-red); transform: translateY(-3px); }
        .v-es { font-weight: bold; font-size: 1.2rem; margin-bottom: 5px; color: var(--text-main); display: block; }
        .v-en { color: var(--text-muted); font-size: 0.9rem; font-style: italic; }

        /* QUIZ */
        .quiz-container {
            background: var(--bg-panel);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #333;
        }

        .question-block {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }
        .question-block:last-child { border-bottom: none; margin-bottom: 0; }

        .q-text {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 15px;
        }

        .options { display: flex; flex-direction: column; gap: 10px; }
        
        .opt-label {
            background: rgba(255,255,255,0.05);
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            border: 1px solid transparent;
        }
        .opt-label:hover { background: rgba(255,255,255,0.1); }
        .opt-label input { margin-right: 15px; transform: scale(1.2); accent-color: var(--primary-red); }

        .btn-submit {
            background: var(--primary-red);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn-submit:hover { background: #b9090b; }

        .feedback {
            margin-top: 10px;
            padding: 10px;
            border-radius: 5px;
            font-weight: bold;
            display: none;
        }
        .fb-correct { background: rgba(34, 197, 94, 0.2); color: var(--success); }
        .fb-wrong { background: rgba(239, 68, 68, 0.2); color: var(--error); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>

        let currentSceneIndex = 0;

        // Inicializar
        function initApp() {
            const sidebar = document.getElementById('sidebar');
            
            moviesDB.forEach((movie, index) => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${index === 0 ? 'active' : ''}`;
                btn.innerHTML = `<span class="material-icons-round">movie</span> ${movie.title}`;
                btn.onclick = () => loadScene(index);
                sidebar.appendChild(btn);
            });

            loadScene(0);
        }

        function loadScene(index) {
            currentSceneIndex = index;
            const scene = moviesDB[index];

            // Update Tabs
            const tabs = document.querySelectorAll('.tab-btn');
            tabs.forEach((t, i) => {
                t.classList.toggle('active', i === index);
            });

            // Update UI Elements
            document.getElementById('ui-title').innerText = scene.title.substring(3); // Quitar el número
            document.getElementById('ui-context').innerText = scene.context;
            // Configurar iframe asegurando su reproducción correcta
            document.getElementById('ui-video').src = `https://www.youtube.com/embed/${scene.videoId}?rel=0`;

            // Update Vocab
            const vocabContainer = document.getElementById('ui-vocab');
            vocabContainer.innerHTML = '';
            scene.vocab.forEach(v => {
                vocabContainer.innerHTML += `
                    <div class="vocab-card">
                        <span class="v-es">${v.es}</span>
                        <span class="v-en">${v.en}</span>
                    </div>
                `;
            });

            // Update Quiz
            const quizForm = document.getElementById('ui-quiz-form');
            quizForm.innerHTML = '';
            scene.quiz.forEach((q, qIndex) => {
                let optionsHtml = '';
                q.opts.forEach((opt, oIndex) => {
                    optionsHtml += `
                        <label class="opt-label">
                            <input type="radio" name="q${qIndex}" value="${oIndex}"> ${opt}
                        </label>
                    `;
                });

                quizForm.innerHTML += `
                    <div class="question-block">
                        <div class="q-text">${qIndex + 1}. ${q.q}</div>
                        <div class="options">${optionsHtml}</div>
                        <div class="feedback" id="fb-${qIndex}"></div>
                    </div>
                `;
            });

            // Reset UI state
            document.getElementById('btn-submit').style.display = 'block';
            document.getElementById('quiz-final-score').style.display = 'none';
            
            // Scroll to top of main content
            document.getElementById('main-content').scrollTop = 0;
        }

        function checkQuiz() {
            const scene = moviesDB[currentSceneIndex];
            const form = document.getElementById('ui-quiz-form');
            let score = 0;

            scene.quiz.forEach((q, qIndex) => {
                const radios = form.querySelectorAll(`input[name="q${qIndex}"]`);
                const feedbackBox = document.getElementById(`fb-${qIndex}`);
                let answered = false;
                let isCorrect = false;

                radios.forEach(radio => {
                    if (radio.checked) {
                        answered = true;
                        if (parseInt(radio.value) === q.ans) {
                            isCorrect = true;
                            score++;
                        }
                    }
                    radio.disabled = true; // Lock
                });

                feedbackBox.style.display = 'block';
                if (!answered) {
                    feedbackBox.className = 'feedback fb-wrong';
                    feedbackBox.innerText = `No respondiste. La correcta era: ${q.opts[q.ans]}`;
                } else if (isCorrect) {
                    feedbackBox.className = 'feedback fb-correct';
                    feedbackBox.innerText = "¡Correcto! ✅";
                } else {
                    feedbackBox.className = 'feedback fb-wrong';
                    feedbackBox.innerText = `Incorrecto ❌. La correcta era: ${q.opts[q.ans]}`;
                }
            });

            document.getElementById('btn-submit').style.display = 'none';
            const finalScore = document.getElementById('quiz-final-score');
            finalScore.style.display = 'block';
            finalScore.innerText = `Puntuación: ${score} / 5`;
            finalScore.style.color = score === 5 ? 'var(--success)' : 'var(--text-main)';
        }

        // Start
        initApp();

    </script>
</body>
</html>
