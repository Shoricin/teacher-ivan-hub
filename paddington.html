<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paddington Episodes Quiz - Colegio Fielding</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --fielding-green: #2E5A27;
            --fielding-gold: #D4AF37;
            --fielding-grey: #4F4F4F;
            --light-bg: #F4F7F2;
            --white: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--light-bg);
            color: var(--fielding-grey);
            line-height: 1.5;
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            background: var(--white);
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-top: 10px solid var(--fielding-green);
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--fielding-gold);
            padding-bottom: 15px;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            color: var(--fielding-green);
            font-size: 2rem;
            margin-bottom: 5px;
            line-height: 1.2;
        }

        .logo-placeholder {
            font-weight: 700;
            color: var(--fielding-gold);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 5px;
            display: block;
            font-size: 0.9rem;
        }

        /* Student Info Box */
        .student-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 4px solid var(--fielding-green);
        }

        .input-group label {
            display: block;
            font-weight: 700;
            margin-bottom: 5px;
            color: var(--fielding-green);
            font-size: 0.9rem;
        }

        .input-group input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: 'Montserrat', sans-serif;
        }

        h2 {
            color: var(--fielding-green);
            margin: 30px 0 15px;
            border-left: 5px solid var(--fielding-gold);
            padding-left: 10px;
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
        }

        /* Scenes and Videos */
        .scene-container {
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px dashed #eee;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            margin-bottom: 20px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* Quiz */
        .question-card {
            background: #fcfcfc;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 6px;
            border: 1px solid #eee;
        }

        .question-card p {
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
        }

        .options label {
            display: block;
            margin: 5px 0;
            cursor: pointer;
            padding: 8px;
            border-radius: 4px;
            background: #fff;
            border: 1px solid #ddd;
            font-size: 0.95rem;
            transition: background 0.2s;
        }

        .options label:hover {
            background: #f0f4ef;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            background: var(--fielding-green);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            transition: all 0.3s;
            margin-top: 20px;
            font-family: 'Montserrat', sans-serif;
        }

        .btn-gold {
            background: var(--fielding-gold);
            color: #000;
        }
        
        .btn-gold:hover {
            background: #b5952f;
        }

        /* PRINT STYLES - HIDING VIDEOS */
        @media print {
            @page {
                margin: 1.5cm;
            }
            body { 
                background: white; 
                font-size: 10pt;
                color: #000;
            }
            .container {
                box-shadow: none;
                margin: 0;
                width: 100%;
                max-width: 100%;
                border-top: none;
                padding: 0;
            }
            /* Hide the videos and buttons when printing */
            .no-print, .btn, .video-wrapper {
                display: none !important;
            }
            
            .scene-container {
                border-bottom: none;
                margin-bottom: 20px;
                padding-bottom: 0;
            }

            header {
                margin-bottom: 10px;
                padding-bottom: 5px;
            }
            header h1 { font-size: 1.4rem; }
            
            .student-box {
                padding: 10px;
                margin-bottom: 15px;
                gap: 10px;
                background: none;
                border: 1px solid #ccc;
                border-left: 4px solid var(--fielding-green);
            }
            
            h2 { margin: 15px 0 10px; font-size: 1.2rem; }

            .question-card { 
                page-break-inside: avoid; 
                border: none; 
                padding: 0 0 10px 0; 
                margin-bottom: 10px;
                border-bottom: 1px dashed #ccc;
                background: none;
            }
            
            .question-card p {
                margin-bottom: 5px;
                font-size: 10pt;
            }

            .options {
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
            }
            
            .options label { 
                border: none; 
                padding: 0; 
                margin: 0;
                margin-right: 15px;
                background: none;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <span class="logo-placeholder">Colegio Fielding Bolivia</span>
        <h1>Listening Practice: Paddington Full Episodes</h1>
        <p>Subject: English Language | Teacher: Iván Mancilla Copa</p>
    </header>

    <div class="student-box">
        <div class="input-group">
            <label>Full Name:</label>
            <input type="text" placeholder="Write your full name here">
        </div>
        <div class="input-group">
            <label>Grade:</label>
            <input type="text" placeholder="e.g. 3rd of Secondary">
        </div>
    </div>

    <div class="no-print" style="margin-bottom: 20px; text-align: center; color: var(--fielding-green); font-weight: bold;">
        <i class="fa-solid fa-circle-info"></i> Watch the full episodes below and answer the questions. Click "Print Quiz" when ready to generate the paper worksheet.
    </div>

    <div id="quiz-container">
        </div>

    <div style="text-align: center; margin-top: 30px;">
        <button class="btn btn-gold no-print" onclick="window.print()">
            <i class="fa-solid fa-print"></i> Print Quiz Worksheet
        </button>
    </div>
</div>

<script>
    // Database of Official Full Episodes, Video IDs and Questions
    const episodesData = [
        {
            title: "Episode 1: Paddington's Pirate Treasure Hunt",
            videoId: "4DvDvbBiUIc",
            questions: [
                { q: "What is Paddington pretending to be in this episode?", options: ["A police officer", "A pirate searching for treasure", "A chef cooking a meal"] },
                { q: "What object helps him find the hidden treasure?", options: ["A compass", "A secret map", "A magnifying glass"] },
                { q: "Where does the treasure hunt take place?", options: ["In the house and the garden", "At the supermarket", "In a dark cave"] },
                { q: "Who helps Paddington read the clues?", options: ["Mrs. Brown", "Mr. Gruber", "Jonathan and Judy"] },
                { q: "What do they usually find at the end of Paddington's adventures?", options: ["Gold coins", "Marmalade sandwiches", "A lot of toys"] }
            ]
        },
        {
            title: "Episode 2: Paddington and the Balloons",
            videoId: "76UUb2TvRJ0", 
            questions: [
                { q: "What does Paddington buy at the beginning?", options: ["A bunch of helium balloons", "A big cake", "A red umbrella"] },
                { q: "What happens when he holds too many balloons?", options: ["They pop loudly", "He floats up into the sky", "He gives them to his friends"] },
                { q: "Who tries to catch Paddington while he is in the air?", options: ["Mr. Brown", "A police officer", "Mr. Curry"] },
                { q: "How does Paddington manage to come back down?", options: ["He pops the balloons one by one", "A bird helps him", "He falls into a swimming pool"] },
                { q: "How does he feel after the adventure?", options: ["Very angry", "Happy but dizzy", "Sad because he lost his hat"] }
            ]
        },
        {
            title: "Episode 3: The Cursed Halloween Show",
            videoId: "-9znxh3U_bw", 
            questions: [
                { q: "Which holiday are the characters celebrating?", options: ["Christmas", "Halloween", "Easter"] },
                { q: "What happens during the magic show?", options: ["A trick goes terribly wrong", "The rabbit runs away", "Everybody falls asleep"] },
                { q: "Who gets scared the most by the spooky events?", options: ["Paddington", "Mrs. Bird", "Mr. Curry"] },
                { q: "What is the 'curse' actually caused by?", options: ["Real ghosts", "A series of funny accidents", "A broken machine"] },
                { q: "What is Paddington's favorite treat to give out?", options: ["Chocolate bars", "Marmalade sandwiches", "Candies"] }
            ]
        },
        {
            title: "Episode 4: Locked Out on Christmas Day",
            videoId: "KlQLlUGvVz8", 
            questions: [
                { q: "What day of the year is it?", options: ["Christmas Day", "Paddington's Birthday", "New Year's Eve"] },
                { q: "What problem does Paddington face in this episode?", options: ["He loses his suitcase", "He gets locked out of the house", "He burns the turkey"] },
                { q: "Why can't he just open the front door?", options: ["He forgot the keys inside", "The door is frozen", "He doesn't know how to use a key"] },
                { q: "How does he try to get back inside the house?", options: ["He breaks a window", "He tries to climb down the chimney", "He digs a tunnel"] },
                { q: "Who eventually helps him solve the problem?", options: ["Santa Claus", "His neighbor", "The Brown family opens the door"] }
            ]
        },
        {
            title: "Episode 5: Paddington Plays Football",
            videoId: "k3qYjyfPS-s", 
            questions: [
                { q: "What sport is Paddington playing with his friends?", options: ["Basketball", "Football (Soccer)", "Tennis"] },
                { q: "Where does the football match take place?", options: ["In the park", "Inside the house", "At a big stadium"] },
                { q: "What happens to the ball during the game?", options: ["It gets flat", "It gets stuck or goes over the fence", "It disappears magically"] },
                { q: "Does Paddington know all the rules of the game?", options: ["Yes, he is a professional player", "No, he makes funny mistakes", "He doesn't want to play"] },
                { q: "What is the most important thing for Paddington at the end?", options: ["Winning the trophy", "Having fun with his friends", "Scoring 10 goals"] }
            ]
        }
    ];

    function renderEpisodesAndQuizzes() {
        const container = document.getElementById('quiz-container');
        
        episodesData.forEach((episode, index) => {
            // Create Section for the Episode
            const episodeDiv = document.createElement('div');
            episodeDiv.className = 'scene-container';
            
            // Add Title
            const title = document.createElement('h2');
            title.innerText = episode.title;
            episodeDiv.appendChild(title);
            
            // Add YouTube Embed
            const videoWrapper = document.createElement('div');
            videoWrapper.className = 'video-wrapper';
            videoWrapper.innerHTML = `<iframe src="https://www.youtube.com/embed/${episode.videoId}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
            episodeDiv.appendChild(videoWrapper);

            // Add Questions
            episode.questions.forEach((q, qIndex) => {
                const qDiv = document.createElement('div');
                qDiv.className = 'question-card';
                
                let optionsHTML = q.options.map((opt, optIndex) => `
                    <label>
                        <input type="radio" name="e${index}_q${qIndex}" value="${optIndex}"> 
                        ${opt}
                    </label>
                `).join('');

                qDiv.innerHTML = `
                    <p>${qIndex + 1}. ${q.q}</p>
                    <div class="options">
                        ${optionsHTML}
                    </div>
                `;
                episodeDiv.appendChild(qDiv);
            });

            container.appendChild(episodeDiv);
        });
    }

    // Render on load
    document.addEventListener('DOMContentLoaded', renderEpisodesAndQuizzes);
</script>

</body>
</html>
